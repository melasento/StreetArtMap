<style>
:root{--ink:#1A1025;--purple:#7B2FBE;--gold:#E8A000;--rust:#C94B22;--sage:#4A8C5C;--sky:#2E7BB4;--pink:#D4467A;--cream:#FAF7F2;--paper:#F2EDE6;--gray-light:#EAE5DC;--gray-mid:#BFB8AE;--gray-text:#6B6258;--r:10px;--sh:0 2px 10px rgba(26,16,37,.08);--shl:0 8px 32px rgba(26,16,37,.16)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--ink);position:relative;flex-shrink:0}
.skyline-wrap{position:relative;width:100%;line-height:0}
.skyline-svg{width:100%;height:68px;display:block}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 20px 8px;position:relative;z-index:4001}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:32px;color:#fff;letter-spacing:2px;line-height:1}
.header-title .art{color:var(--gold)}
.header-title .city{font-size:13px;letter-spacing:4px;color:#9990AB;display:block;font-family:'DM Sans',sans-serif;font-weight:500;margin-top:1px;text-transform:uppercase}
.header-sub{font-size:11.5px;color:rgba(255,255,255,.45);max-width:200px;line-height:1.5;text-align:right;margin-top:4px}
.search-row{display:flex;gap:8px;padding:10px 16px;background:var(--cream);border-bottom:1px solid var(--gray-light);flex-shrink:0}
.search-box{flex:1;display:flex;align-items:center;gap:8px;background:#fff;border-radius:var(--r);padding:9px 13px;border:1.5px solid var(--gray-light)}
.search-box input{border:none;background:transparent;outline:none;font-size:13.5px;font-family:'DM Sans',sans-serif;color:var(--ink);width:100%}
.search-box input::placeholder{color:var(--gray-mid)}
.filter-btn{display:flex;align-items:center;gap:5px;border:1.5px solid var(--gray-light);border-radius:var(--r);padding:9px 13px;background:#fff;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--ink);transition:all .15s}
.filter-btn:hover{background:var(--gray-light)}
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--cream);border-bottom:1px solid var(--gray-light);flex-shrink:0;flex-wrap:wrap}
.tab-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;border:1.5px solid transparent;background:transparent;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--gray-text);transition:all .15s}

.view-toggle{display:flex;border:1.5px solid var(--gray-light);border-radius:8px;overflow:hidden}
.view-btn{display:flex;align-items:center;gap:4px;padding:6px 11px;border:none;background:#fff;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--ink);transition:all .15s}
.view-btn.active{background:var(--purple);color:#fff}
.add-btn{display:flex;align-items:center;gap:5px;padding:8px 14px;background:var(--gold);color:var(--ink);border:none;border-radius:8px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:700;margin-left:auto;transition:all .15s}
.add-btn:hover{background:#CC8C00;transform:translateY(-1px)}
.cats-scroll{display:flex;gap:7px;padding:8px 16px;background:var(--cream);border-bottom:1px solid var(--gray-light);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.cats-scroll::-webkit-scrollbar{display:none}
.cat-pill{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--gray-light);background:#fff;cursor:pointer;font-size:12.5px;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--ink);white-space:nowrap;flex-shrink:0;transition:all .15s}
.cat-pill:hover{border-color:var(--gray-mid)}
.cat-pill.active{color:#fff;border-color:transparent}
.main{flex:1;overflow:hidden;position:relative}
#map{width:100%;height:100%}
.custom-marker{width:20px;height:20px;border-radius:50%;border:2.5px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:pointer;transition:transform .15s}
.custom-marker:hover{transform:scale(1.4)}
.artist-popup{position:absolute;bottom:16px;left:16px;right:16px;background:#fff;border-radius:14px;box-shadow:var(--shl);padding:14px 16px;display:none;z-index:1000;animation:slideUp .2s ease;border:1px solid var(--gray-light)}
.artist-popup.show{display:flex;align-items:center;gap:12px}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.popup-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.popup-name{font-weight:700;font-size:15px;color:var(--ink)}
.popup-zone{font-size:12px;color:var(--gray-text);margin-top:2px}
.popup-rating{display:flex;align-items:center;gap:3px;font-size:12px;font-weight:600}
.popup-rating .star{color:var(--gold)}
.popup-info{flex:1}
.popup-open-btn{padding:8px 14px;background:var(--purple);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s}
.popup-open-btn:hover{background:#6521A4}
.popup-close{position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;color:var(--gray-mid);font-size:14px}
.list-view{display:none;height:100%;overflow-y:auto;padding:14px;gap:10px;flex-direction:column;background:var(--paper)}
.list-view.show{display:flex}
.artist-card{display:flex;align-items:center;gap:12px;background:#fff;border-radius:var(--r);padding:13px;box-shadow:var(--sh);cursor:pointer;transition:all .15s;border:1px solid var(--gray-light)}
.artist-card:hover{transform:translateY(-2px);box-shadow:var(--shl)}
.card-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card-name{font-weight:700;font-size:14.5px;color:var(--ink)}
.card-pseudo{font-size:11px;color:var(--purple);font-weight:600;margin-top:1px}
.card-zone{font-size:12px;color:var(--gray-text);margin-top:2px}
.card-rating{display:flex;align-items:center;gap:3px;font-size:12px;font-weight:600;margin-top:3px}
.card-rating .star{color:var(--gold);font-size:11px}
.card-info{flex:1}
.card-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.card-chevron{color:var(--gray-light);font-size:18px}
.exh-card{display:flex;background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:all .15s;border:1px solid var(--gray-light)}
.exh-card:hover{transform:translateY(-2px);box-shadow:var(--shl)}
.ex-date-box{width:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;color:#fff;flex-shrink:0}
.ex-date-day{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1}
.ex-date-month{font-size:10px;font-weight:600;opacity:.85;margin-top:1px}
.ex-info{flex:1;padding:12px 13px}
.ex-title{font-weight:700;font-size:14px;color:var(--ink)}
.ex-artist{font-size:12px;color:var(--gray-text);margin-top:2px}
.ex-location{font-size:12px;color:var(--gray-mid);margin-top:3px}
.ex-tags{display:flex;gap:6px;margin-top:6px}
.tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.tag-time{background:#EFE8F7;color:var(--purple)}
.tag-free{background:#E8F5EE;color:#2E7D4F}
.footer{background:var(--ink);padding:7px 20px;text-align:center;font-size:12.5px;color:rgba(255,255,255,.45);flex-shrink:0}
.footer strong{color:var(--gold);font-weight:700}
.modal-overlay{position:fixed;inset:0;background:rgba(26,16,37,.5);z-index:2000;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--cream);border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;animation:slideUpModal .28s ease}
@keyframes slideUpModal{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--gray-light);position:sticky;top:0;background:var(--cream);border-radius:20px 20px 0 0;z-index:1}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--ink)}
.modal-close{background:var(--gray-light);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:var(--gray-mid)}
.modal-body{padding:20px}
.artist-detail-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 12px}
.artist-detail-name{font-family:'Bebas Neue',sans-serif;font-size:26px;text-align:center;letter-spacing:1px;color:var(--ink)}
.artist-pseudo{text-align:center;font-size:12px;color:var(--purple);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.artist-detail-rating{display:flex;align-items:center;justify-content:center;gap:3px;margin-top:6px}
.sf{color:var(--gold)}.se{color:var(--gray-light)}
.rating-text{font-size:13px;font-weight:700;color:var(--ink)}
.rating-count{font-size:12px;color:var(--gray-text)}
.cat-badge{display:flex;align-items:center;gap:4px;padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;width:fit-content;margin:8px auto 0}
.detail-location{display:flex;align-items:center;justify-content:center;gap:4px;font-size:12.5px;color:var(--gray-text);margin-top:5px}
.social-links{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.social-link{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--gray-light);font-size:12px;font-weight:600;color:var(--ink);text-decoration:none;background:#fff;transition:all .15s}
.social-link:hover{background:var(--gray-light)}
.social-ig{border-color:#E1306C;color:#E1306C}
.social-web{border-color:var(--purple);color:var(--purple)}
.divider{height:1px;background:var(--gray-light);margin:16px 0}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--ink);margin-bottom:8px}
.bio-text{font-size:13.5px;color:var(--gray-text);line-height:1.65}
.perf-pills{display:flex;flex-wrap:wrap;gap:7px}
.perf-pill{display:flex;align-items:center;gap:4px;background:#EFE8F7;padding:5px 11px;border-radius:20px;font-size:12px;color:var(--purple);font-weight:500}
.review-card{background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid var(--gray-light)}
.review-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.review-avatar{width:32px;height:32px;border-radius:50%;background:#EFE8F7;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--purple)}
.review-author{font-size:13px;font-weight:700;color:var(--ink)}
.review-date{font-size:11px;color:var(--gray-mid)}
.review-text{font-size:13px;color:var(--gray-text);line-height:1.5}
.review-stars{display:flex;gap:1px}
.star-picker{display:flex;gap:6px;margin-bottom:10px}
.star-pick{font-size:24px;cursor:pointer;transition:transform .1s;color:var(--gray-light)}
.star-pick:hover,.star-pick.active{color:var(--gold);transform:scale(1.2)}
.review-textarea{width:100%;border:1.5px solid var(--gray-light);border-radius:10px;padding:11px 13px;font-size:13.5px;font-family:'DM Sans',sans-serif;resize:none;outline:none;color:var(--ink);background:#fff;transition:border-color .15s}
.review-textarea:focus{border-color:var(--purple)}
.submit-btn{width:100%;padding:13px;background:var(--purple);color:#fff;border:none;border-radius:10px;font-size:15px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;cursor:pointer;margin-top:10px;transition:all .15s}
.submit-btn:hover{background:#6521A4}
.type-toggle{display:flex;background:var(--gray-light);border-radius:10px;padding:4px;margin-bottom:18px}
.type-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;border:none;border-radius:8px;background:transparent;cursor:pointer;font-size:13.5px;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--gray-text);transition:all .15s}
.type-btn.active{background:#fff;color:var(--purple);font-weight:700;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.form-field{margin-bottom:15px}
.form-label{font-size:12px;font-weight:700;color:var(--ink);margin-bottom:5px;display:block;letter-spacing:.5px;text-transform:uppercase}
.form-input{width:100%;border:1.5px solid var(--gray-light);border-radius:9px;padding:10px 13px;font-size:13.5px;font-family:'DM Sans',sans-serif;outline:none;color:var(--ink);background:#fff;transition:border-color .15s}
.form-input:focus{border-color:var(--purple)}
.cat-grid{display:flex;flex-wrap:wrap;gap:7px}
.cat-option{display:flex;align-items:center;gap:4px;padding:6px 11px;border-radius:20px;border:1.5px solid var(--gray-light);background:#fff;cursor:pointer;font-size:12.5px;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--ink);transition:all .15s}
.cat-option.selected{font-weight:700}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;color:var(--gray-mid);gap:8px;font-size:14px}
.empty-icon{font-size:34px}
.list-view::-webkit-scrollbar{width:3px}
.list-view::-webkit-scrollbar-thumb{background:var(--gray-light);border-radius:4px}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:var(--gray-light);border-radius:4px}

/* ── LANGUAGE SELECTOR ── */
.lang-btn{background:none;border:1.5px solid rgba(255,255,255,.25);border-radius:8px;color:#fff;padding:5px 10px;cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:600;display:flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;line-height:1.4}
.lang-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.5)}
.lang-wrap{position:relative}
/* Dropdown uses fixed positioning — appended to body so it's never clipped */
#langPortal{
  position:fixed;
  background:#fff;
  border-radius:14px;
  box-shadow:0 12px 40px rgba(0,0,0,.3);
  z-index:99999;
  width:210px;
  max-height:400px;
  overflow-y:auto;
  display:none;
  border:1px solid rgba(0,0,0,.07);
}
#langPortal.open{display:block;animation:fadeDropDown .15s ease}
@keyframes fadeDropDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
#langPortal::-webkit-scrollbar{width:3px}
#langPortal::-webkit-scrollbar-thumb{background:#EAE5DC;border-radius:4px}
.lang-option{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;font-size:13.5px;font-family:'DM Sans',sans-serif;font-weight:500;color:#1A1025;transition:background .1s;border-bottom:1px solid #F5F3EE}
.lang-option:last-child{border-bottom:none}
.lang-option:hover{background:#F5F3FF}
.lang-option.active{background:#EFE8F7;color:#7B2FBE;font-weight:700}
.lang-flag{font-size:20px;line-height:1;flex-shrink:0}
.lang-label{flex:1}

/* ── GEOLOCATION ── */
.user-dot-wrap{position:relative;width:20px;height:20px}
.user-dot{width:16px;height:16px;background:#1A73E8;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(26,115,232,.5);position:absolute;top:2px;left:2px;z-index:2}
.user-dot-pulse{width:20px;height:20px;background:rgba(26,115,232,.25);border-radius:50%;position:absolute;top:0;left:0;animation:pulse 2s ease-out infinite}
@keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(2.5);opacity:0}}
.locate-btn{position:absolute;bottom:96px;right:14px;z-index:1000;width:40px;height:40px;background:#fff;border:none;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s}
.locate-btn:hover{background:#F0F0F0;transform:scale(1.05)}
.locate-btn.tracking{background:#E8F0FE}
.geo-toast{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:1001;background:rgba(26,16,37,.85);color:#fff;font-size:12.5px;font-family:'DM Sans',sans-serif;font-weight:500;padding:8px 16px;border-radius:20px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .3s;backdrop-filter:blur(4px)}
.geo-toast.show{opacity:1}
.nearby-badge{background:#E8F0FE;color:#1A73E8;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px}
.dist-text{font-size:11px;color:#1A73E8;font-weight:600;margin-top:2px}
</style>

<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">Street<span class="art">Art</span> Map<span class="city">Roma</span></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
      <div class="lang-wrap">
        <button class="lang-btn" id="langBtn">🇮🇹 IT ▾</button>
      </div>
      <div class="header-sub" id="headerSub">Artisti di strada, murales e live art nella Città Eterna</div>
    </div>
  </div>
  <div class="skyline-wrap">
    <svg class="skyline-svg" viewBox="0 0 1200 68" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1A1025"/><stop offset="100%" stop-color="#2D1B4E"/></linearGradient>
        <linearGradient id="bG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3A2E5A"/><stop offset="100%" stop-color="#2A2040"/></linearGradient>
        <filter id="gw"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

<div class="search-row">
  <div class="search-box">
    <span style="color:#BFB8AE;font-size:15px">🔍</span>
    <input type="text" id="searchInput" placeholder="Cerca artista, pseudonimo o quartiere..." oninput="applyFilters()">
  </div>
  <button class="filter-btn">⚙️ Filtri</button>
</div>

<div class="toolbar">
  <div style="display:flex;gap:4px">
    <button class="tab-btn active" id="tab-artisti" onclick="switchTab('artisti')">👤 Artisti</button>
    <button class="tab-btn" id="tab-esibizioni" onclick="switchTab('esibizioni')">📅 Esibizioni</button>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="view-mappa" onclick="switchView('mappa')">🗺️ Mappa</button>
    <button class="view-btn" id="view-lista" onclick="switchView('lista')">☰ Lista</button>
  </div>
  <button class="add-btn" onclick="openAddModal()">＋ Aggiungi</button>
</div>

<div class="cats-scroll" id="catsContainer"></div>

<div class="main">
  <div id="map"></div>
  <div class="list-view" id="listView"></div>
  <button class="locate-btn" id="locateBtn" onclick="centerOnUser()" title="Vai alla mia posizione">📍</button>
  <div class="geo-toast" id="geoToast"></div>
  <div class="artist-popup" id="artistPopup">
    <div class="popup-dot" id="popupDot"></div>
    <div class="popup-info">
      <div class="popup-name" id="popupName"></div>
      <div class="popup-zone" id="popupZone"></div>
      <div class="popup-rating"><span class="star">★</span><span id="popupRating"></span></div>
    </div>
    <button class="popup-open-btn" id="popupOpenBtn">Vedi →</button>
    <button class="popup-close" onclick="closePopup()">✕</button>
  </div>
</div>

<div class="footer" id="footer"></div>

<!-- ARTIST MODAL -->
<div class="modal-overlay" id="artistModal">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeArtistModal()">✕</button>
      <div class="modal-title" id="artistModalTitle">Profilo Artista</div>
      <div style="width:30px"></div>
    </div>
    <div class="modal-body" id="artistModalBody"></div>
  </div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeAddModal()">✕</button>
      <div class="modal-title" id="addModalTitle">Aggiungi</div>
      <div style="width:30px"></div>
    </div>
    <div class="modal-body">
      <div class="type-toggle">
        <button class="type-btn active" id="addTypeArtista" onclick="switchAddType('artista')">👤 Artista</button>
        <button class="type-btn" id="addTypeEsibizione" onclick="switchAddType('esibizione')">📅 Esibizione</button>
      </div>
      <div id="addFormFields"></div>
      <button class="submit-btn" id="submitAddBtn" onclick="submitAdd()">AGGIUNGI</button>
    </div>
  </div>
</div>

let currentLang='it';
function t(key,...args){
  const val=T[currentLang]?.[key]||T['en']?.[key]||key;
  return typeof val==='function'?val(...args):val;
}

function toggleLangMenu(e){
  e&&e.stopPropagation();
  const portal=document.getElementById('langPortal');
  const btn=document.getElementById('langBtn');
  const isOpen=portal.classList.contains('open');
  if(isOpen){portal.classList.remove('open');return;}
  // Build full list every time
  portal.innerHTML=LANGS.map(l=>`
    <div class="lang-option ${l.code===currentLang?'active':''}" data-lang="${l.code}">
      <span class="lang-flag">${l.flag}</span>
      <span class="lang-label">${l.label}</span>
      ${l.code===currentLang?'<span style="color:#7B2FBE;font-size:12px">✓</span>':''}
    </div>`).join('');
  portal.querySelectorAll('.lang-option').forEach(el=>{
    el.addEventListener('click',ev=>{ev.stopPropagation();setLang(el.dataset.lang);});
  });
  // Position portal directly below the button using getBoundingClientRect
  const r=btn.getBoundingClientRect();
  portal.style.top=(r.bottom+6)+'px';
  portal.style.right=(window.innerWidth-r.right)+'px';
  portal.classList.add('open');
}

function setLang(code){
  currentLang=code;
  const lang=LANGS.find(l=>l.code===code);
  document.getElementById('langBtn').textContent=`${lang.flag} ${code.toUpperCase()} ▾`;
  document.getElementById('langPortal').classList.remove('open');
  // RTL support for Arabic
  document.body.style.direction=code==='ar'?'rtl':'ltr';
  applyTranslations();
}

function applyTranslations(){
  // Modal titles
  const amt=document.getElementById('artistModalTitle');if(amt)amt.textContent=t('profileTitle');
  const admt=document.getElementById('addModalTitle');if(admt)admt.textContent=t('addTitle');
  const saBtn=document.getElementById('submitAddBtn');if(saBtn)saBtn.textContent=t('submitAdd');
  document.getElementById('addTypeArtista').innerHTML=`👤 ${t('addArtist')}`;
  document.getElementById('addTypeEsibizione').innerHTML=`📅 ${t('addExhibition')}`;
  // Re-render artist modal if open (bio + reviews must change language)
  const modal=document.getElementById('artistModal');
  if(modal.classList.contains('show')){
    const curId=modal.dataset.artistId;
    if(curId) openArtistModal(curId);
  }
  // Header subtitle
  document.getElementById('headerSub').textContent=t('subtitle');
  // Search
  document.getElementById('searchInput').placeholder=t('searchPlaceholder');
  // Filter btn
  document.querySelector('.filter-btn').innerHTML=`⚙️ ${t('filters')}`;
  // Tabs
  document.getElementById('tab-artisti').innerHTML=`👤 ${t('tabArtists')}`;
  document.getElementById('tab-esibizioni').innerHTML=`📅 ${t('tabExhibitions')}`;
  // View toggle
  document.getElementById('view-mappa').innerHTML=`🗺️ ${t('viewMap')}`;
  document.getElementById('view-lista').innerHTML=`☰ ${t('viewList')}`;
  // Add btn
  document.querySelector('.add-btn').innerHTML=`＋ ${t('addBtn')}`;
  // Categories
  renderCats();
  // Footer
  updateFooter();
  // Re-render list if open
  if(vMode==='lista') renderList();
  // Locate btn title
  document.getElementById('locateBtn').title=t('geoCentered');
  // User marker popup
  if(userMarker) userMarker.setPopupContent(`<b>${t('youAreHere')}</b>`);
}

// Close lang portal when clicking outside
document.addEventListener('click',function(e){
  const portal=document.getElementById('langPortal');
  const btn=document.getElementById('langBtn');
  if(portal&&!portal.contains(e.target)&&btn&&!btn.contains(e.target)){
    portal.classList.remove('open');
  }
});

     fr:'Artiste visuelle romaine née en 1980, diplômée de l\'Académie des Beaux-Arts de Rome avec un Master en critique d\'art à Madrid. L\'une des rares femmes de renommée internationale dans le street art contemporain. Ses œuvres — présentes dans plus de 100 villes dans le monde — racontent des émotions féminines, des relations humaines et des moments suspendus.',
     de:'Römische Bildkünstlerin, geboren 1980, mit Abschluss an der Akademie der Schönen Künste in Rom und Master in Kunstkritik in Madrid. Eine der wenigen international anerkannten Frauen in der zeitgenössischen Street Art. Ihre Werke — in über 100 Städten weltweit — erzählen von weiblichen Gefühlen, menschlichen Beziehungen und schwebenden Momenten.',
     pt:'Artista visual romana nascida em 1980, formada na Academia de Belas-Artes de Roma com Mestrado em crítica de arte em Madrid. Uma das poucas mulheres de destaque internacional na street art contemporânea. As suas obras — presentes em mais de 100 cidades do mundo — narram emoções femininas, relações humanas e momentos suspensos.',
     nl:'Romeinse beeldend kunstenaar geboren in 1980, afgestudeerd aan de Academie voor Schone Kunsten in Rome met een Master kunstkritiek in Madrid. Een van de weinige internationaal prominente vrouwen in de hedendaagse street art. Haar werken — aanwezig in meer dan 100 steden wereldwijd — vertellen over vrouwelijke emoties en menselijke relaties.',
     pl:'Rzymska artystka wizualna urodzona w 1980 r., absolwentka Akademii Sztuk Pięknych w Rzymie z tytułem magistra krytyki artystycznej w Madrycie. Jedna z niewielu kobiet o międzynarodowej renomie w street arcie. Jej prace — obecne w ponad 100 miastach na świecie — opowiadają o kobiecych emocjach i relacjach międzyludzkich.',
     ru:'Римская художница, родившаяся в 1980 году. Окончила Академию изящных искусств в Риме, магистр искусствоведения в Мадриде. Одна из немногих женщин с международным признанием в современном стрит-арте. Её работы — в более чем 100 городах мира — рассказывают о женских эмоциях и человеческих отношениях.',
     zh:'1980年出生的罗马视觉艺术家，毕业于罗马美术学院，并在马德里获得艺术评论硕士学位。当代街头艺术中少数具有国际知名度的女性之一。她的作品遍布全球100多个城市，描绘女性情感、人际关系和悬停时刻，远离刻板印象。',
     ja:'1980年生まれのローマ出身ビジュアルアーティスト。ローマ美術アカデミー卒業後、マドリードで美術評論の修士号を取得。現代ストリートアートで国際的に知名度の高い数少ない女性アーティストの一人。世界100都市以上で作品を展示し、女性の感情や人間関係を表現。',
     ar:'فنانة بصرية رومانية ولدت عام 1980، تخرجت من أكاديمية الفنون الجميلة في روما مع ماجستير في نقد الفن بمدريد. إحدى النساء القليلات ذوات الشهرة الدولية في فن الشوارع المعاصر. أعمالها موجودة في أكثر من 100 مدينة حول العالم.',
   },

   reviews_data:[
     {author:'Valentina R.',rating:5,
      text:{it:'Ho visto il suo murale al Quadraro dal vivo: le donne che dipinge sembrano respirare. Un\'artista che trasforma quartieri interi in gallerie a cielo aperto.',en:'I saw her mural at Quadraro live: the women she paints seem to breathe. An artist who transforms entire neighbourhoods into open-air galleries.',es:'Vi su mural en Quadraro en persona: las mujeres que pinta parecen respirar. Una artista que transforma barrios enteros en galerías al aire libre.',fr:'J\'ai vu sa fresque au Quadraro en vrai : les femmes qu\'elle peint semblent respirer. Une artiste qui transforme des quartiers entiers en galeries à ciel ouvert.',de:'Ich habe ihr Wandbild im Quadraro live gesehen: Die Frauen, die sie malt, scheinen zu atmen. Eine Künstlerin, die ganze Viertel in Freiluftgalerien verwandelt.',pt:'Vi o seu mural no Quadraro ao vivo: as mulheres que pinta parecem respirar. Uma artista que transforma bairros inteiros em galerias a céu aberto.',nl:'Ik zag haar muurschildering in Quadraro live: de vrouwen die ze schildert lijken te ademen.',pl:'Widziałem jej mural w Quadraro na żywo: kobiety, które maluje, wydają się oddychać.',ru:'Я видел её мурал в Квадраро вживую: женщины, которых она рисует, словно дышат.',zh:'我亲眼见过她在Quadraro的壁画：她画的女人仿佛在呼吸。',ja:'クアドラーロで彼女の壁画を実際に見ました。描かれた女性たちが呼吸しているようです。',ar:'رأيت جداريتها في كوادرارو شخصياً: النساء اللواتي ترسمهن يبدو أنهن يتنفسن.'},
      date:'3 giorni fa'},
     {author:'Marco T.',rating:5,
      text:{it:'Seguo il suo lavoro da anni su Instagram. La mostra al MACRO è stata una delle più belle che ho visto a Roma. Merita ogni riconoscimento.',en:'I\'ve been following her work for years on Instagram. The exhibition at MACRO was one of the most beautiful I\'ve seen in Rome. She deserves every recognition.',es:'Sigo su trabajo desde hace años en Instagram. La exposición en el MACRO fue una de las más bonitas que he visto en Roma.',fr:'Je suis son travail depuis des années sur Instagram. L\'exposition au MACRO était l\'une des plus belles que j\'ai vues à Rome.',de:'Ich verfolge ihre Arbeit seit Jahren auf Instagram. Die Ausstellung im MACRO war eine der schönsten, die ich in Rom gesehen habe.',pt:'Sigo o seu trabalho há anos no Instagram. A exposição no MACRO foi uma das mais bonitas que vi em Roma.',nl:'Ik volg haar werk al jaren op Instagram. De tentoonstelling in MACRO was een van de mooiste die ik in Rome heb gezien.',pl:'Śledzę jej pracę od lat na Instagramie. Wystawa w MACRO była jedną z najpiękniejszych, jakie widziałem w Rzymie.',ru:'Я слежу за её работой уже много лет в Instagram. Выставка в MACRO была одной из лучших, что я видел в Риме.',zh:'我在Instagram上关注她的作品已经多年了。她在MACRO的展览是我在罗马见过最美的展览之一。',ja:'Instagramで長年彼女の作品をフォローしています。MACROでの展覧会はローマで見た中で最も美しいものの一つでした。',ar:'أتابع عملها منذ سنوات على انستغرام. كان المعرض في ماكرو من أجمل ما رأيت في روما.'},
      date:'2 settimane fa'},
   ]},
  {id:'2',name:'Sten & Lex',pseudo:'Sten Lex',category:'stencil',
   bio:{
     it:'Duo artistico formato da Sten (Roma, 1982) e Lex (Taranto, 1982), pionieri dello stencil graffiti in Italia. Dal 2001 hanno inventato la tecnica dello "Stencil Poster": incollano un poster gigante sul muro, ritagliano come uno stencil, dipingono e poi distruggono la matrice — lasciando che il tempo sveli l\'opera finale. Nel 2008 Banksy li ha invitati al suo Cans Festival di Londra.',
     en:'Artistic duo formed by Sten (Rome, 1982) and Lex (Taranto, 1982), pioneers of stencil graffiti in Italy. Since 2001 they invented the "Stencil Poster" technique: they paste a giant poster on the wall, cut it like a stencil, paint and then destroy the matrix — letting time slowly reveal the final work. In 2008 Banksy invited them to his Cans Festival in London.',
     es:'Dúo artístico formado por Sten (Roma, 1982) y Lex (Taranto, 1982), pioneros del graffiti de plantilla en Italia. Desde 2001 inventaron la técnica del "Stencil Poster": pegan un cartel gigante en la pared, lo recortan como una plantilla, pintan y luego destruyen la matriz.',
     fr:'Duo artistique formé par Sten (Rome, 1982) et Lex (Tarente, 1982), pionniers du stencil graffiti en Italie. Depuis 2001, ils ont inventé la technique du "Stencil Poster" : ils collent une affiche géante sur le mur, la découpent comme un pochoir, peignent puis détruisent la matrice.',
     de:'Künstlerduo aus Sten (Rom, 1982) und Lex (Tarent, 1982), Pioniere des Stencil-Graffitis in Italien. Seit 2001 haben sie die "Stencil Poster"-Technik erfunden: Sie kleben ein riesiges Poster an die Wand, schneiden es wie eine Schablone aus, malen und zerstören dann die Vorlage.',
     pt:'Duo artístico formado por Sten (Roma, 1982) e Lex (Taranto, 1982), pioneiros do stencil graffiti em Itália. Desde 2001 inventaram a técnica do "Stencil Poster": colam um cartaz gigante na parede, recortam como um stencil, pintam e depois destroem a matriz.',
     nl:'Artistiek duo gevormd door Sten (Rome, 1982) en Lex (Taranto, 1982), pioniers van stencilgraffiti in Italië. Sinds 2001 hebben ze de "Stencil Poster"-techniek uitgevonden.',
     pl:'Duet artystyczny złożony ze Stena (Rzym, 1982) i Lexa (Taranto, 1982), pionierów graffiti szablonowego we Włoszech. Od 2001 roku wynaleźli technikę "Stencil Poster".',
     ru:'Творческий дуэт из Стена (Рим, 1982) и Лекса (Таранто, 1982), пионеров трафаретного граффити в Италии. С 2001 года они изобрели технику "Stencil Poster".',
     zh:'由Sten（罗马，1982年）和Lex（塔兰托，1982年）组成的艺术二人组，是意大利模板涂鸦的先驱。自2001年起发明了"模板海报"技术。',
     ja:'ステン（ローマ、1982年）とレックス（タラント、1982年）によるアーティストデュオ。イタリアのステンシルグラフィティのパイオニア。2001年から「ステンシルポスター」技法を発明。',
     ar:'ثنائي فني مكون من ستن (روما، 1982) وليكس (تارانتو، 1982)، رواد الغرافيتي بالاستنسيل في إيطاليا. منذ 2001 ابتكرا تقنية "ملصق الاستنسيل".',
   },
   rating:4.8,reviews:198,lat:41.8680,lng:12.4948,city:'Roma',zone:'Ostiense / Pigneto',
   performances:['Via delle Conce 14, Ostiense','Via F. Baracca, Torpignattara','Stazione Ostiense','Garbatella'],
   instagram:'https://www.instagram.com/sten.lex/',website:'https://stenlex.com',igHandle:'@sten.lex',
   reviews_data:[
     {author:'Federico B.',rating:5,
      text:{it:'Il ritratto anonimo in via delle Conce è una delle opere più potenti di Roma. La tecnica dello stencil poster è un\'invenzione geniale: guardi e senti che l\'opera vive.',en:'The anonymous portrait on via delle Conce is one of the most powerful works in Rome. The stencil poster technique is a brilliant invention: you look and feel that the work is alive.',es:'El retrato anónimo en via delle Conce es una de las obras más poderosas de Roma. La técnica del stencil poster es una invención brillante.',fr:'Le portrait anonyme de via delle Conce est l\'une des œuvres les plus puissantes de Rome. La technique du stencil poster est une invention géniale.',de:'Das anonyme Porträt in der via delle Conce ist eines der kraftvollsten Werke Roms. Die Stencil-Poster-Technik ist eine geniale Erfindung.',pt:'O retrato anónimo na via delle Conce é uma das obras mais poderosas de Roma.',nl:'Het anonieme portret op via delle Conce is een van de krachtigste werken van Rome.',pl:'Anonimowy portret przy via delle Conce jest jednym z najpotężniejszych dzieł Rzymu.',ru:'Анонимный портрет на via delle Conce — одна из самых мощных работ Рима.',zh:'Via delle Conce的匿名肖像是罗马最有力的作品之一。',ja:'ヴィア・デッレ・コンチェの匿名の肖像はローマで最も力強い作品の一つです。',ar:'البورتريه المجهول في via delle Conce هو أحد أقوى الأعمال في روما.'},
      date:'1 settimana fa'},
     {author:'Carla M.',rating:4,
      text:{it:'Ho fatto il tour street art ad Ostiense appositamente per i loro murales. Ogni opera è un dialogo tra tempo, carta e muro. Vale ogni secondo.',en:'I did the street art tour in Ostiense specifically for their murals. Each work is a dialogue between time, paper and wall. Worth every second.',es:'Hice el tour de street art en Ostiense específicamente para ver sus murales. Cada obra es un diálogo entre el tiempo, el papel y la pared.',fr:'J\'ai fait le tour street art à Ostiense spécialement pour leurs fresques. Chaque œuvre est un dialogue entre le temps, le papier et le mur.',de:'Ich habe die Street-Art-Tour in Ostiense extra für ihre Wandbilder gemacht. Jedes Werk ist ein Dialog zwischen Zeit, Papier und Wand.',pt:'Fiz o tour de street art em Ostiense especialmente para os seus murais.',nl:'Ik deed de street art tour in Ostiense speciaal voor hun muurschilderingen.',pl:'Zrobiłam wycieczkę street art w Ostiense specjalnie dla ich murali.',ru:'Я специально отправилась на экскурсию по стрит-арту в Остиенсе ради их работ.',zh:'我专门为了他们的壁画去Ostiense参观了街头艺术之旅。',ja:'オスティエンセのストリートアートツアーを彼らの壁画のために行いました。',ar:'قمت بجولة street art في أوستيينسي خصيصاً لمشاهدة أعمالهم.'},
      date:'1 mese fa'},
   ]},
  {id:'3',name:'Luca Vollono',pseudo:'Lucamaleonte',category:'murales',
   bio:{
     it:'Nato a Roma il 30 settembre 1983, laureato all\'Istituto Centrale per il Restauro. Attivo nella street art dal 2001, si distingue per uno stile che fonde illustrazione botanica, arte etrusca e bestiari medievali. Nel 2008 è stato tra i pochi italiani invitati da Banksy al Cans Festival di Londra. Tra i suoi murales celebri a Roma: il ritratto di Francesco Totti (Scuola Pascoli, Appio-Latino) e il murale per Gigi Proietti al Tufello.',
     en:'Born in Rome on 30 September 1983, graduated from the Central Institute for Restoration. Active in street art since 2001, he stands out for a style blending botanical illustration, Etruscan art and medieval bestiaries. In 2008 he was among the few Italians invited by Banksy to his Cans Festival in London.',
     es:'Nacido en Roma el 30 de septiembre de 1983, licenciado en el Instituto Central de Restauración. Activo en el street art desde 2001, destaca por un estilo que fusiona ilustración botánica, arte etrusco y bestiarios medievales.',
     fr:'Né à Rome le 30 septembre 1983, diplômé de l\'Institut Central de Restauration. Actif dans le street art depuis 2001, il se distingue par un style mêlant illustration botanique, art étrusque et bestiaires médiévaux.',
     de:'Geboren in Rom am 30. September 1983, Abschluss am Zentralinstitut für Restaurierung. Seit 2001 in der Street Art aktiv, zeichnet er sich durch einen Stil aus, der botanische Illustration, etruskische Kunst und mittelalterliche Bestiare verbindet.',
     pt:'Nascido em Roma a 30 de setembro de 1983, formado no Instituto Central de Restauro. Ativo no street art desde 2001, destaca-se por um estilo que combina ilustração botânica, arte etrusca e bestiários medievais.',
     nl:'Geboren in Rome op 30 september 1983, afgestudeerd aan het Centraal Instituut voor Restauratie. Actief in street art sinds 2001.',
     pl:'Urodzony w Rzymie 30 września 1983 r., absolwent Centralnego Instytutu Restauracji. Aktywny w street arcie od 2001 r.',
     ru:'Родился в Риме 30 сентября 1983 года. Окончил Центральный институт реставрации. Занимается стрит-артом с 2001 года.',
     zh:'1983年9月30日出生于罗马，毕业于中央修复学院。自2001年起活跃于街头艺术，以融合植物插图、伊特鲁里亚艺术和中世纪兽形图鉴的风格著称。',
     ja:'1983年9月30日ローマ生まれ。中央修復研究所卒業。2001年からストリートアートで活躍し、植物画、エトルリア美術、中世動物寓意集を融合したスタイルが特徴。',
     ar:'وُلد في روما في 30 سبتمبر 1983، تخرج من المعهد المركزي للترميم. نشط في فن الشوارع منذ 2001.',
   },

   instagram:'https://www.instagram.com/lucamaleonte/',website:null,igHandle:'@lucamaleonte',
   reviews_data:[
     {author:'Simone A.',rating:5,
      text:{it:'Il murale di Totti alla scuola Pascoli è iconico. Riesce a catturare l\'eroismo popolare con tratti classici, come un affresco romano contemporaneo.',en:'The Totti mural at the Pascoli school is iconic. It captures popular heroism with classical traits, like a contemporary Roman fresco.',es:'El mural de Totti en la escuela Pascoli es icónico. Logra capturar el heroísmo popular con rasgos clásicos, como un fresco romano contemporáneo.',fr:'La fresque de Totti à l\'école Pascoli est iconique. Elle capture l\'héroïsme populaire avec des traits classiques, comme une fresque romaine contemporaine.',de:'Das Totti-Wandbild an der Pascoli-Schule ist ikonisch. Es fängt volkstümlichen Heroismus mit klassischen Zügen ein, wie ein zeitgenössisches römisches Fresko.',pt:'O mural do Totti na escola Pascoli é icónico. Consegue capturar o heroísmo popular com traços clássicos.',nl:'Het Totti-muurschildering bij de Pascoli-school is iconisch.',pl:'Mural Tottiego przy szkole Pascoli jest ikoniczny.',ru:'Мурал с Тотти в школе Паскали — культовый.',zh:'Pascoli学校的托蒂壁画是标志性的，用古典笔触捕捉了民间英雄主义。',ja:'パスコーリ学校のトッティの壁画は象徴的です。古典的な筆致で民衆の英雄主義を捉えています。',ar:'جدارية توتي في مدرسة باسكولي أيقونية. يلتقط البطولة الشعبية بملامح كلاسيكية.'},
      date:'4 giorni fa'},
     {author:'Elena V.',rating:4,
      text:{it:'"Patrimonio Indigeno" a San Lorenzo è un viaggio nella storia del quartiere. Si vede che conosce profondamente la città — non solo l\'arte.',en:'"Patrimonio Indigeno" in San Lorenzo is a journey through the history of the neighbourhood. You can tell he knows the city deeply — not just the art.',es:'"Patrimonio Indigeno" en San Lorenzo es un viaje por la historia del barrio. Se nota que conoce profundamente la ciudad, no solo el arte.',fr:'"Patrimonio Indigeno" à San Lorenzo est un voyage dans l\'histoire du quartier. On voit qu\'il connaît profondément la ville.',de:'"Patrimonio Indigeno" in San Lorenzo ist eine Reise durch die Geschichte des Viertels.',pt:'"Patrimonio Indigeno" em San Lorenzo é uma viagem pela história do bairro.',nl:'"Patrimonio Indigeno" in San Lorenzo is een reis door de geschiedenis van de wijk.',pl:'"Patrimonio Indigeno" w San Lorenzo to podróż przez historię dzielnicy.',ru:'"Patrimonio Indigeno" в Сан-Лоренцо — путешествие по истории района.',zh:'"Patrimonio Indigeno"在San Lorenzo是一次穿越街区历史的旅程。',ja:'サン・ロレンツォの「Patrimonio Indigeno」は地区の歴史を旅するようです。',ar:'"باتريمونيو إنديجينو" في سان لورنتسو رحلة في تاريخ الحي.'},
      date:'3 settimane fa'},
   ]},
  {id:'4',name:'Federico',pseudo:'Federico dei Fori',category:'musica',
   bio:{
     it:'Musicista di strada che si esibisce quotidianamente lungo via dei Fori Imperiali — uno dei palcoscenici naturali più suggestivi al mondo. Chitarra e amplificatore, di fronte alle rovine dell\'antica Roma. "Suonare per strada è divertente perché sei libero, autonomo e indipendente, fai quello che vuoi quando vuoi." È necessario un permesso annuale (gratuito) per esibirsi nella zona.',
     en:'Street musician who performs daily along via dei Fori Imperiali — one of the most evocative natural stages in the world. Guitar and amplifier, facing the ruins of ancient Rome. "Playing on the street is fun because you are free, autonomous and independent, you do what you want when you want." An annual (free) permit is required to perform in the area.',
     es:'Músico callejero que actúa diariamente en la via dei Fori Imperiali — uno de los escenarios naturales más sugestivos del mundo. Guitarra y amplificador, frente a las ruinas de la antigua Roma.',
     fr:'Musicien de rue qui se produit quotidiennement le long de la via dei Fori Imperiali — l\'une des scènes naturelles les plus évocatrices du monde. Guitare et amplificateur, face aux ruines de la Rome antique.',
     de:'Straßenmusiker, der täglich entlang der via dei Fori Imperiali auftritt — einer der stimmungsvollsten natürlichen Bühnen der Welt. Gitarre und Verstärker, gegenüber den Ruinen des antiken Roms.',
     pt:'Músico de rua que actua diariamente ao longo da via dei Fori Imperiali — um dos palcos naturais mais sugestivos do mundo.',
     nl:'Straatmuzikant die dagelijks optreedt langs de via dei Fori Imperiali — een van de meest suggestieve natuurlijke podia ter wereld.',
     pl:'Muzyk uliczny występujący codziennie wzdłuż via dei Fori Imperiali — jednej z najbardziej sugestywnych naturalnych scen na świecie.',
     ru:'Уличный музыкант, ежедневно выступающий вдоль via dei Fori Imperiali — одной из самых впечатляющих природных сцен в мире.',
     zh:'每天在古罗马广场路表演的街头音乐家——世界上最令人印象深刻的天然舞台之一。吉他与扩音器，面对古罗马的废墟。',
     ja:'毎日フォロ・インペリアーリ通りで演奏するストリートミュージシャン。ギターとアンプを持ち、古代ローマの遺跡を前に演奏する。',
     ar:'موسيقي شارع يعزف يومياً على طول via dei Fori Imperiali — أحد أكثر المسارح الطبيعية إثارةً في العالم.',

   reviews_data:[
     {author:'Turista da Berlino',rating:5,
      text:{it:'Chitarra acustica con il Colosseo sullo sfondo al tramonto. È stata l\'esperienza più bella del mio viaggio a Roma. Musica vera, senza filtri.',en:'Acoustic guitar with the Colosseum in the background at sunset. It was the most beautiful experience of my trip to Rome. Real music, unfiltered.',es:'Guitarra acústica con el Coliseo de fondo al atardecer. Fue la experiencia más bonita de mi viaje a Roma. Música real, sin filtros.',fr:'Guitare acoustique avec le Colisée en arrière-plan au coucher du soleil. C\'était la plus belle expérience de mon voyage à Rome.',de:'Akustikgitarre mit dem Kolosseum im Hintergrund bei Sonnenuntergang. Es war das schönste Erlebnis meiner Romreise.',pt:'Guitarra acústica com o Coliseu ao fundo ao pôr do sol. Foi a experiência mais bonita da minha viagem a Roma.',nl:'Akoestische gitaar met het Colosseum op de achtergrond bij zonsondergang.',pl:'Gitara akustyczna z Koloseum w tle o zachodzie słońca. To było najpiękniejsze przeżycie mojej podróży do Rzymu.',ru:'Акустическая гитара на фоне Колизея на закате. Это было лучшее впечатление от поездки в Рим.',zh:'夕阳下以斗兽场为背景的原声吉他演奏。这是我罗马之行中最美丽的体验。',ja:'夕暮れ時のコロッセオを背景にしたアコースティックギター。ローマ旅行で最も美しい体験でした。',ar:'غيتار أكوستيك مع الكولوسيوم في الخلفية عند غروب الشمس. كانت أجمل تجربة في رحلتي إلى روما.'},
      date:'5 giorni fa'},
     {author:'Giulia P.',rating:4,
      text:{it:'Lo vedo spesso al mattino. La sua musica accompagna la passeggiata ai Fori in modo perfetto — malinconica e intensa.',en:'I see him often in the morning. His music perfectly accompanies the walk to the Forum — melancholic and intense.',es:'Lo veo a menudo por la mañana. Su música acompaña perfectamente el paseo por los Foros — melancólica e intensa.',fr:'Je le vois souvent le matin. Sa musique accompagne parfaitement la promenade aux Forums — mélancolique et intense.',de:'Ich sehe ihn oft morgens. Seine Musik begleitet den Spaziergang zum Forum perfekt — melancholisch und intensiv.',pt:'Vejo-o frequentemente de manhã. A sua música acompanha perfeitamente o passeio pelos Fóruns.',nl:'Ik zie hem vaak \'s ochtends. Zijn muziek begeleidt de wandeling naar het Forum perfect.',pl:'Widzę go często rano. Jego muzyka idealnie towarzyszy spacerowi po Forum.',ru:'Я часто вижу его по утрам. Его музыка идеально сопровождает прогулку по Форуму.',zh:'我早上经常看到他。他的音乐完美地伴随着在古罗马广场的散步——忧郁而深沉。',ja:'朝よく見かけます。彼の音楽はフォルムへの散歩を完璧に彩ります—憂鬱で力強い。',ar:'أراه كثيراً في الصباح. موسيقاه ترافق المشي في المنتدى بشكل مثالي.'},
      date:'2 settimane fa'},
   ]},
  {id:'5',name:'Giuseppe',pseudo:'Giuseppe & Lillo',category:'musica',
   bio:{
     it:'Musicista con il suo fedele cane Lillo, che riposa sulla custodia della chitarra elettrica durante ogni esibizione ai Fori Imperiali. Suona ogni giorno evitando la fascia 13:00-16:00 (vietata in quella zona). "Questo è il luogo migliore dove suonare — qui ci sono più turisti e spazi sempre decenti." La sua storia racconta la libertà e la precarietà dell\'arte di strada.',
     en:'Musician with his faithful dog Lillo, who rests on the electric guitar case during every performance at the Fori Imperiali. He plays every day avoiding the 13:00-16:00 slot (prohibited in that area). "This is the best place to play — here there are more tourists and decent spaces always." His story tells of the freedom and precariousness of street art.',
     es:'Músico con su fiel perro Lillo, que descansa sobre el estuche de la guitarra eléctrica durante cada actuación en los Foros Imperiales. Toca cada día evitando el horario de 13:00 a 16:00 (prohibido en esa zona).',
     fr:'Musicien avec son fidèle chien Lillo, qui se repose sur l\'étui de guitare électrique pendant chaque représentation aux Forums Impériaux. Il joue chaque jour en évitant la tranche 13h-16h (interdite dans cette zone).',
     de:'Musiker mit seinem treuen Hund Lillo, der bei jeder Vorstellung an den Kaiserforen auf dem E-Gitarrenkoffer ruht. Er spielt jeden Tag und meidet die Zeitspanne 13-16 Uhr (in diesem Bereich verboten).',
     pt:'Músico com o seu fiel cão Lillo, que descansa na caixa da guitarra eléctrica durante cada actuação nos Foros Imperiais.',
     nl:'Muzikant met zijn trouwe hond Lillo, die tijdens elke voorstelling op de gitaarkoffer rust.',
     pl:'Muzyk z wiernym psem Lillo, który odpoczywa na futerale gitary elektrycznej podczas każdego występu.',
     ru:'Музыкант с верным псом Лилло, который отдыхает на чехле электрогитары во время каждого выступления.',
     zh:'音乐家和他忠实的狗Lillo，Lillo在古罗马广场每次表演时都躺在电吉他盒上休息。',
     ja:'フォロ・インペリアーレでの毎回の演奏中、エレキギターのケースの上で休んでいる忠実な犬Lilloと一緒のミュージシャン。',
     ar:'موسيقي مع كلبه الوفي ليلو، الذي يستريح على حقيبة الغيتار الكهربائي خلال كل عرض.',
   },
   rating:4.5,reviews:67,lat:41.8924,lng:12.4890,city:'Roma',zone:'Fori Imperiali',
   performances:['Via dei Fori Imperiali'],
   instagram:null,website:null,igHandle:null,
   reviews_data:[
     {author:'Anna L.',rating:5,
      text:{it:'Il cagnolino Lillo è adorabile! Lui e Giuseppe sono diventati una piccola istituzione dei Fori. Musica autentica, il tipo che ti fa fermare senza volerlo.',en:'Little Lillo is adorable! He and Giuseppe have become a little institution of the Forum. Authentic music, the kind that makes you stop without meaning to.',es:'¡El pequeño Lillo es adorable! Él y Giuseppe se han convertido en una pequeña institución de los Foros. Música auténtica.',fr:'Le petit Lillo est adorable ! Lui et Giuseppe sont devenus une petite institution des Forums. Musique authentique.',de:'Der kleine Lillo ist entzückend! Er und Giuseppe sind zu einer kleinen Institution des Forums geworden.',pt:'O pequeno Lillo é adorável! Ele e Giuseppe tornaram-se uma pequena instituição dos Fóruns.',nl:'De kleine Lillo is schattig! Hij en Giuseppe zijn een kleine instelling van het Forum geworden.',pl:'Mały Lillo jest adorowalny! On i Giuseppe stali się małą instytucją Forum.',ru:'Маленький Лилло восхитителен! Он и Джузеппе стали маленькой институцией Форума.',zh:'小Lillo真可爱！他和Giuseppe已经成为古罗马广场的一个小小传奇。',ja:'リッロちゃんは可愛いです！彼とジュゼッペはフォルムの小さな名物になっています。',ar:'الكلب الصغير ليلو رائع! هو وجوزيبي أصبحا مؤسسة صغيرة في المنتدى.'},
      date:'1 settimana fa'},
     {author:'Marco F.',rating:4,
      text:{it:'Ho lasciato un\'offerta con piacere. Si vede che suona per passione vera — non solo per guadagnare. Ha una sensibilità rara.',en:'I left a donation gladly. You can tell he plays out of true passion — not just to earn money. He has a rare sensitivity.',es:'Dejé una donación con mucho gusto. Se nota que toca por verdadera pasión, no solo para ganar dinero.',fr:'J\'ai laissé une offrande avec plaisir. On voit qu\'il joue par vraie passion — pas seulement pour gagner de l\'argent.',de:'Ich habe gerne eine Spende hinterlassen. Man sieht, dass er aus echter Leidenschaft spielt.',pt:'Deixei uma esmola com prazer. Nota-se que toca por verdadeira paixão.',nl:'Ik liet graag een donatie achter. Je kunt zien dat hij speelt vanuit echte passie.',pl:'Zostawiłem datek z przyjemnością. Widać, że gra z prawdziwej pasji.',ru:'Я с удовольствием оставил пожертвование. Видно, что он играет из настоящей страсти.',zh:'我很愿意留下捐款。可以看出他是出于真正的热情在演奏，而不仅仅是为了赚钱。',ja:'喜んで寄付しました。本当の情熱から演奏しているのが伝わります。',ar:'تركت تبرعاً بكل سرور. يُرى أنه يعزف بشغف حقيقي.'},
      date:'3 settimane fa'},
   ]},
  {id:'6',name:'Jorit Agoch',pseudo:'Jorit',category:'murales',
   bio:{
     it:'Nato a Napoli nel 1990 da padre italiano e madre olandese, è uno dei muralisti più famosi d\'Italia. Le guance dei suoi soggetti portano sempre due strisce rosse tribali, simbolo dell\'unità della "Human Tribe". A Roma: il ritratto di Luana D\'Orazio (operaia morta sul lavoro a 22 anni) all\'Ex Snia Viscosa. Le sue opere monumentali ritraggono Maradona, Pasolini, Ilaria Cucchi e molti altri.',
     en:'Born in Naples in 1990 to an Italian father and a Dutch mother, he is one of the most famous muralists in Italy. The cheeks of his subjects always bear two red tribal stripes, a symbol of the unity of the "Human Tribe". In Rome: the portrait of Luana D\'Orazio (a worker who died on the job at 22) at the Ex Snia Viscosa.',
     es:'Nacido en Nápoles en 1990 de padre italiano y madre holandesa, es uno de los muralistas más famosos de Italia. Las mejillas de sus sujetos siempre llevan dos rayas rojas tribales, símbolo de la unidad de la "Tribu Humana".',
     fr:'Né à Naples en 1990 d\'un père italien et d\'une mère néerlandaise, il est l\'un des muralistes les plus célèbres d\'Italie. Les joues de ses sujets portent toujours deux rayures rouges tribales, symbole de l\'unité de la "Tribu Humaine".',
     de:'1990 in Neapel geboren, Sohn eines Italieners und einer Niederländerin, ist er einer der bekanntesten Wandmaler Italiens. Die Wangen seiner Motive tragen immer zwei rote Stammesstreifen, Symbol der Einheit des "Human Tribe".',
     pt:'Nascido em Nápoles em 1990 de pai italiano e mãe holandesa, é um dos muralistas mais famosos de Itália. As bochechas dos seus sujeitos têm sempre duas listras vermelhas tribais.',
     nl:'Geboren in Napels in 1990 uit een Italiaanse vader en een Nederlandse moeder, is hij een van de beroemdste muurschilders van Italië.',
     pl:'Urodzony w Neapolu w 1990 r., syn Włocha i Holenderki, jeden z najsłynniejszych muralistów Włoch.',
     ru:'Родился в Неаполе в 1990 году от итальянца и голландки. Один из самых известных муралистов Италии.',
     zh:'1990年出生于那不勒斯，父亲是意大利人，母亲是荷兰人，是意大利最著名的壁画家之一。他的画中人物脸颊上总带有两条红色部落条纹，象征"人类部落"的统一。',
     ja:'1990年ナポリ生まれ、イタリア人の父とオランダ人の母を持つ。イタリアで最も有名な壁画家の一人。対象の頬には常に「ヒューマン・トライブ」の統一を象徴する2本の赤い部族の縞。',
     ar:'وُلد في نابولي عام 1990 لأب إيطالي وأم هولندية، وهو أحد أشهر رسامي الجداريات في إيطاليا.',
   },
   rating:4.9,reviews:234,lat:41.8912,lng:12.5450,city:'Roma',zone:'Pigneto / Prenestino',
   performances:['Ex Snia Viscosa (Pigneto)','Ostiense','Torpignattara'],
   instagram:'https://www.instagram.com/jorit/',website:null,igHandle:'@jorit',
   reviews_data:[
     {author:'Roberto C.',rating:5,
      text:{it:'Il murale di Luana D\'Orazio all\'Ex Snia è devastante. Due strisce rosse e uno sguardo che ti entra nell\'anima. Arte civile al massimo livello possibile.',en:'The Luana D\'Orazio mural at the Ex Snia is devastating. Two red stripes and a gaze that pierces your soul. Civil art at the highest possible level.',es:'El mural de Luana D\'Orazio en el Ex Snia es devastador. Dos rayas rojas y una mirada que te entra en el alma.',fr:'La fresque de Luana D\'Orazio à l\'Ex Snia est dévastatrice. Deux rayas rouges et un regard qui vous pénètre l\'âme.',de:'Das Luana-D\'Orazio-Wandbild in der Ex Snia ist verheerend. Zwei rote Streifen und ein Blick, der die Seele trifft.',pt:'O mural de Luana D\'Orazio no Ex Snia é devastador.',nl:'De Luana D\'Orazio-muurschildering bij de Ex Snia is verwoestend.',pl:'Mural Luany D\'Orazio w Ex Snia jest druzgocący.',ru:'Мурал с Луаной Д\'Орацио в Ex Snia потрясает.',zh:'Ex Snia的Luana D\'Orazio壁画令人震撼。两条红色条纹和一个穿透灵魂的眼神。',ja:'Ex SniaのLuana D\'Orzioの壁画は圧倒的です。2本の赤い縞と魂を貫く視線。',ar:'جدارية لوانا دي أوراتسيو في إكس سنيا مدمرة. شريطان أحمران ونظرة تدخل الروح.'},
      date:'2 giorni fa'},
     {author:'Sara M.',rating:5,
      text:{it:'Ho fatto il viaggio da Milano solo per vedere i suoi murales a Roma. Jorit ha trasformato i muri in monumenti umani — ogni opera è una preghiera laica.',en:'I made the trip from Milan just to see his murals in Rome. Jorit has turned walls into human monuments — every work is a secular prayer.',es:'Hice el viaje desde Milán solo para ver sus murales en Roma. Jorit ha transformado las paredes en monumentos humanos.',fr:'J\'ai fait le voyage depuis Milan juste pour voir ses fresques à Rome. Jorit a transformé les murs en monuments humains.',de:'Ich bin extra aus Mailand gereist, um seine Wandbilder in Rom zu sehen. Jorit hat Mauern in menschliche Denkmäler verwandelt.',pt:'Fiz a viagem de Milão especialmente para ver os seus murais em Roma.',nl:'Ik reisde van Milaan om zijn muurschilderingen in Rome te zien.',pl:'Pojechałam z Mediolanu specjalnie, żeby zobaczyć jego murale w Rzymie.',ru:'Я специально приехала из Милана, чтобы увидеть его муралы в Риме.',zh:'我专程从米兰来看他在罗马的壁画。Jorit把墙壁变成了人类的纪念碑。',ja:'ローマの彼の壁画を見るためにミラノから来ました。Joritは壁を人間の記念碑に変えました。',ar:'سافرت من ميلانو خصيصاً لرؤية جدارياته في روما. حول جوريت الجدران إلى آثار إنسانية.'},
      date:'10 giorni fa'},
   ]},
  {id:'7',name:'Francesco Persichella',pseudo:'PIVSK',category:'murales',
   bio:{
     it:'Street artist romano, ha trasformato lo spazio abbandonato sotto il cavalcavia della Tangenziale Est (via dello Scalo San Lorenzo) in un coloratissimo campo da basket dipinto, ora punto di aggregazione del quartiere. Un esempio concreto di come l\'arte di strada possa riqualificare spazi urbani: non solo estetica, ma creazione di comunità.',
     en:'Roman street artist who transformed the abandoned space under the East Ring Road viaduct (via dello Scalo San Lorenzo) into a colourful painted basketball court, now a community gathering point. A concrete example of how street art can regenerate urban spaces: not just aesthetics, but community building.',
     es:'Street artist romano que transformó el espacio abandonado bajo el viaducto de la Tangencial Este en una colorida cancha de baloncesto pintada, ahora punto de encuentro del barrio.',
     fr:'Street artiste romain qui a transformé l\'espace abandonné sous le viaduc du périphérique Est en un court de basket coloré, maintenant point de rencontre du quartier.',
     de:'Römischer Street Artist, der den verlassenen Raum unter dem Viadukt des Ostrings (via dello Scalo San Lorenzo) in einen bunten bemalten Basketballplatz verwandelt hat.',
     pt:'Street artista romano que transformou o espaço abandonado sob o viaduto da Tangencial Este num colorido campo de basquete pintado.',
     nl:'Romeinse street artist die de verlaten ruimte onder het viaduct van de oostelijke ringweg omzette in een kleurrijke basketbalveld.',
     pl:'Rzymski street artist, który zamienił opuszczoną przestrzeń pod wiaduktem wschodniej obwodnicy w kolorowe boisko do koszykówki.',
     ru:'Римский стрит-арт художник, превративший заброшенное пространство под эстакадой Восточной кольцевой в красочную баскетбольную площадку.',
     zh:'罗马街头艺术家，将东环路高架桥下的废弃空间（San Lorenzo货运站路）改造成了色彩鲜艳的彩绘篮球场，现已成为社区聚集地。',
     ja:'東環状道路高架橋下の廃墟スペースをカラフルな絵が描かれたバスケットボールコートに変えたローマのストリートアーティスト。',
     ar:'فنان شوارع روماني حوّل الفضاء المهجور تحت جسر الطريق الدائري الشرقي إلى ملعب كرة سلة ملوّن.',
   },
   rating:4.6,reviews:78,lat:41.8960,lng:12.5080,city:'Roma',zone:'San Lorenzo',
   performances:['Via dello Scalo San Lorenzo','Pigneto'],
   instagram:null,website:null,igHandle:null,
   reviews_data:[
     {author:'Davide L.',rating:5,
      text:{it:'Il campo da basket sotto la Tangenziale è magico. Da spazio abbandonato e degradato a punto di incontro per il quartiere — questo è il potere reale della street art.',en:'The basketball court under the ring road is magical. From an abandoned and degraded space to a meeting point for the neighbourhood — this is the real power of street art.',es:'La cancha de baloncesto bajo la tangencial es mágica. De espacio abandonado a punto de encuentro del barrio — este es el verdadero poder del street art.',fr:'Le court de basket sous le périphérique est magique. D\'un espace abandonné à un point de rencontre pour le quartier.',de:'Der Basketballplatz unter dem Ring ist magisch. Vom verlassenen, heruntergekommenen Raum zum Treffpunkt für das Viertel.',pt:'O campo de basquete debaixo da tangencial é mágico. De espaço abandonado a ponto de encontro do bairro.',nl:'Het basketbalveld onder de ringweg is magisch.',pl:'Boisko do koszykówki pod obwodnicą jest magiczne.',ru:'Баскетбольная площадка под кольцевой дорогой — настоящее волшебство.',zh:'环城高速下的篮球场太神奇了。从废弃的破败空间到街区的聚集点——这就是街头艺术的真正力量。',ja:'環状道路の下のバスケットコートは魔法のようです。廃墟から地域の集まる場所へ。',ar:'ملعب كرة السلة تحت الطريق الدائري رائع. من فضاء مهجور إلى نقطة تجمع للحي.'},
      date:'1 settimana fa'},
     {author:'Chiara V.',rating:4,
      text:{it:'Colori esplosivi in un angolo che nessuno guardava prima. Ha dato identità visiva a un posto che ne aveva urgente bisogno. Chapeau.',en:'Explosive colours in a corner that nobody looked at before. He gave visual identity to a place that urgently needed it. Hats off.',es:'Colores explosivos en un rincón que nadie miraba antes. Le dio identidad visual a un lugar que lo necesitaba urgentemente.',fr:'Des couleurs explosives dans un coin que personne ne regardait avant. Il a donné une identité visuelle à un endroit qui en avait urgemment besoin.',de:'Explosive Farben in einer Ecke, die vorher niemand beachtet hat. Er hat einem Ort, der es dringend brauchte, eine visuelle Identität gegeben.',pt:'Cores explosivas num canto que ninguém olhava antes. Deu identidade visual a um local que precisava urgentemente.',nl:'Explosieve kleuren in een hoek die niemand eerder bekeek.',pl:'Eksplozja kolorów w kącie, na który nikt wcześniej nie patrzył.',ru:'Взрывные цвета в углу, на который раньше никто не смотрел.',zh:'在以前无人注意的角落里有着爆炸性的色彩。他为一个迫切需要的地方赋予了视觉身份。',ja:'以前は誰も見向きもしなかった場所に爆発的な色彩。緊急に必要としていた場所に視覚的アイデンティティを与えました。',ar:'ألوان متفجرة في زاوية لم يلتفت إليها أحد من قبل. أعطى هويةً بصرية لمكان كان يحتاجها بشدة.'},
      date:'1 mese fa'},
   ]},
  {id:'8',name:'Hitnes',pseudo:'Hitnes',category:'murales',
   bio:{
     it:'Street artist romano, uno dei protagonisti della scena capitolina da oltre vent\'anni. Noto per grandi murales che combinano elementi naturalistici — fauna, flora, mondo animale — con iconografie pop e culturali. Presente nel quartiere Ostiense insieme a Sten & Lex, Blu e altri grandi nomi. La sua ricerca mescola metafora visiva e precisione quasi scientifica nella rappresentazione degli animali.',
     en:'Roman street artist, one of the leading figures of the capital\'s scene for over twenty years. Known for large murals combining naturalistic elements — fauna, flora, animal world — with pop and cultural iconographies. Present in the Ostiense district alongside Sten & Lex, Blu and other big names.',
     es:'Street artista romano, uno de los protagonistas de la escena capitalina desde hace más de veinte años. Conocido por grandes murales que combinan elementos naturalistas con iconografías pop y culturales.',
     fr:'Street artiste romain, l\'un des protagonistes de la scène de la capitale depuis plus de vingt ans. Connu pour de grandes fresques combinant éléments naturalistes — faune, flore, monde animal — avec des iconographies pop et culturelles.',
     de:'Römischer Street Artist, einer der führenden Vertreter der Hauptstadtszene seit über zwanzig Jahren. Bekannt für große Wandbilder, die naturalistische Elemente mit Pop- und Kulturikonografien verbinden.',
     pt:'Street artista romano, um dos protagonistas da cena da capital há mais de vinte anos. Conhecido por grandes murais que combinam elementos naturalistas com iconografias pop e culturais.',
     nl:'Romeinse street artist, een van de hoofdrolspelers van de Romeinse scene gedurende meer dan twintig jaar.',
     pl:'Rzymski street artist, jeden z głównych przedstawicieli sceny stołecznej od ponad dwudziestu lat.',
     ru:'Римский стрит-арт художник, один из ведущих представителей столичной сцены более двадцати лет.',
     zh:'罗马街头艺术家，二十多年来首都艺术圈的重要人物。以融合自然主义元素（动植物、动物世界）与流行文化图像的大型壁画著称。',
     ja:'ローマのストリートアーティスト。20年以上にわたって首都のシーンをリードする存在。動植物など自然主義的な要素とポップ・文化的図像を組み合わせた大型壁画で知られる。',
     ar:'فنان شوارع روماني، أحد أبرز وجوه مشهد العاصمة منذ أكثر من عشرين عاماً.',
   },
   rating:4.7,reviews:92,lat:41.8680,lng:12.4810,city:'Roma',zone:'Ostiense / Garbatella',
   performances:['Ostiense','Garbatella','Pigneto'],
   instagram:'https://www.instagram.com/hitnes/',website:null,igHandle:'@hitnes',
   reviews_data:[
     {author:'Luca T.',rating:5,
      text:{it:'I suoi murales ad Ostiense sono entrati nel paesaggio urbano romano. Un naturalismo contemporaneo che dialoga con l\'architettura del quartiere.',en:'His murals in Ostiense have become part of the Roman urban landscape. A contemporary naturalism that dialogues with the architecture of the neighbourhood.',es:'Sus murales en Ostiense han entrado en el paisaje urbano romano. Un naturalismo contemporáneo que dialoga con la arquitectura del barrio.',fr:'Ses fresques à Ostiense font partie du paysage urbain romain. Un naturalisme contemporain qui dialogue avec l\'architecture du quartier.',de:'Seine Wandbilder in Ostiense sind Teil der römischen Stadtlandschaft geworden. Ein zeitgenössischer Naturalismus, der mit der Architektur des Viertels dialogisiert.',pt:'Os seus murais em Ostiense entraram na paisagem urbana romana.',nl:'Zijn muurschilderingen in Ostiense zijn onderdeel geworden van het Romeinse stadslandschap.',pl:'Jego murale w Ostiense stały się częścią rzymskiego krajobrazu miejskiego.',ru:'Его муралы в Остиенсе стали частью римского городского пейзажа.',zh:'他在Ostiense的壁画已融入罗马城市景观。一种与街区建筑对话的当代自然主义。',ja:'オスティエンセの彼の壁画はローマの都市景観の一部となっています。',ar:'جدارياته في أوستيينسي أصبحت جزءاً من المشهد الحضري الروماني.'},
      date:'2 settimane fa'},
     {author:'Marta B.',rating:4,
      text:{it:'Molto bravo tecnicamente, si vede la padronanza. Avrei voluto più opere nel centro storico — merita visibilità ovunque.',en:'Technically very skilled, you can see the mastery. I would have liked more works in the historic centre — he deserves visibility everywhere.',es:'Muy bueno técnicamente, se nota el dominio. Habría querido más obras en el centro histórico.',fr:'Techniquement très bon, on voit la maîtrise. J\'aurais aimé plus d\'œuvres dans le centre historique.',de:'Technisch sehr gut, man sieht das Können. Ich hätte mir mehr Werke im historischen Zentrum gewünscht.',pt:'Tecnicamente muito bom, nota-se o domínio. Gostaria de ter mais obras no centro histórico.',nl:'Technisch zeer vaardig, je ziet de beheersing.',pl:'Technicznie bardzo dobry, widać mistrzostwo.',ru:'Технически очень хорош, чувствуется мастерство.',zh:'技术上非常精湛，可以感受到大师风范。我希望历史中心能有更多他的作品。',ja:'技術的に非常に優れており、熟練が伝わります。歴史的中心部にもっと作品があれば良かった。',ar:'ماهر جداً من الناحية التقنية، يظهر التمكن. كنت أتمنى المزيد من الأعمال في المركز التاريخي.'},
      date:'3 settimane fa'},
   ]},
];
