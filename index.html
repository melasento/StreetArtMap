ARTISTS.push(
  {id:'9',name:'Federico Massa',pseudo:'Iena Cruz',category:'murales',
   bio:{
     it:'Street artist milanese (1981) che vive tra New York, Miami e Barcellona. Attivo dagli anni \'90, si distingue per murales monumentali a tema ambientale — fauna a rischio, inquinamento, crisi climatica. A Roma nel 2018 ha realizzato "Hunting Pollution" in via del Porto Fluviale (Ostiense): 1.000 mq con pittura ecologica Airlite che purifica l\'aria come 30 alberi. Il più grande eco-murales d\'Europa. Raffigura un airone tricolore (specie a rischio) che pesca in un mare inquinato sotto una pioggia di petrolio. Il progetto è di Yourban2030, no profit di Veronica De Angelis. Opera presente anche in via Tessalonica (San Paolo) con "Outside In", 250 mq anti-omofobia (2020).',
     en:'Milanese street artist (1981) living between New York, Miami and Barcelona. Active since the 1990s, known for monumental murals on environmental themes — endangered species, pollution, climate crisis. In Rome in 2018 he created "Hunting Pollution" at via del Porto Fluviale (Ostiense): 1,000 sqm of eco-friendly Airlite paint that purifies air like 30 trees. The largest eco-mural in Europe, depicting an endangered heron fishing in a polluted sea under oil rain.',
     es:'Artista callejero milanés (1981) que vive entre Nueva York, Miami y Barcelona. Activo desde los años 90, conocido por murales monumentales sobre temas ambientales. En Roma en 2018 realizó "Hunting Pollution" en via del Porto Fluviale: 1.000 m² con pintura ecológica Airlite que purifica el aire como 30 árboles.',
     fr:'Street artiste milanais (1981) vivant entre New York, Miami et Barcelone. Actif depuis les années 1990, connu pour des murales monumentaux sur les thèmes environnementaux. À Rome en 2018 il a réalisé "Hunting Pollution" via del Porto Fluviale: 1 000 m² de peinture Airlite qui purifie l\'air comme 30 arbres.',
     de:'Mailänder Street Artist (1981), lebt zwischen New York, Miami und Barcelona. Seit den 1990ern aktiv, bekannt für monumentale Wandbilder zu Umweltthemen. In Rom 2018 schuf er "Hunting Pollution" an der via del Porto Fluviale: 1.000 qm Airlite-Ökofarbe, die die Luft wie 30 Bäume reinigt.',
     pt:'Artista de rua milanês (1981) que vive entre Nova Iorque, Miami e Barcelona. Ativo desde os anos 90, conhecido por murais monumentais sobre temas ambientais. Em Roma em 2018 realizou "Hunting Pollution" na via del Porto Fluviale: 1.000 m² de tinta ecológica Airlite.',
     nl:'Milanese street artist (1981) die leeft tussen New York, Miami en Barcelona. Actief sinds de jaren 90, bekend om monumentale muurschilderingen over milieuonderwerpen. In Rome in 2018 maakte hij "Hunting Pollution" aan de via del Porto Fluviale: 1.000 m² Airlite eco-verf.',
     pl:'Medioleński artysta uliczny (1981) mieszkający między Nowym Jorkiem, Miami i Barceloną. Aktywny od lat 90., znany z monumentalnych murali na temat środowiska. W Rzymie w 2018 roku stworzył "Hunting Pollution" przy via del Porto Fluviale.',
     ru:'Миланский стрит-арт художник (1981), живущий между Нью-Йорком, Майами и Барселоной. Активен с 1990-х годов. В Риме в 2018 году создал "Hunting Pollution" на via del Porto Fluviale: 1000 кв.м экологической краски Airlite.',
     zh:'米兰街头艺术家（1981年），往来于纽约、迈阿密和巴塞罗那之间。自90年代起活跃，以环境主题的大型壁画著称。2018年在罗马Ostiense区Porto Fluviale路创作了"Hunting Pollution"：1000平方米的Airlite生态涂料，净化空气相当于30棵树。欧洲最大的生态壁画。',
     ja:'ミラノ出身のストリートアーティスト（1981年）。ニューヨーク、マイアミ、バルセロナを拠点に活動。1990年代から活躍し、環境問題をテーマとした巨大壁画で知られる。2018年にローマのオスティエンセ地区でヨーロッパ最大のエコ壁画「Hunting Pollution」（1000㎡）を制作。',
     ar:'فنان شوارع ميلاني (1981) يعيش بين نيويورك وميامي وبرشلونة. نشط منذ التسعينيات، معروف بالجداريات الضخمة حول البيئة. في روما عام 2018 أنجز "Hunting Pollution" في via del Porto Fluviale: 1000 م² من طلاء Airlite البيئي.',
   },
   rating:4.8,reviews:178,lat:41.8695,lng:12.4757,city:'Roma',zone:'Ostiense / Piramide',
   performances:['Via del Porto Fluviale / Via del Gazometro, Ostiense','Via Tessalonica, San Paolo'],
   instagram:'https://www.instagram.com/ienacruz/',website:null,igHandle:'@ienacruz',
   reviews_data:[
     {author:'Lorenzo P.',rating:5,
      text:{it:'"Hunting Pollution" è impressionante: un palazzo intero diventato manifesto ecologico. L\'airone è maestoso e il fatto che la pittura purifichi l\'aria lo rende unico al mondo.',en:'"Hunting Pollution" is impressive: an entire building turned into an ecological manifesto. The heron is majestic, and the fact that the paint purifies the air makes it unique in the world.',es:'"Hunting Pollution" es impresionante: un edificio entero convertido en manifiesto ecológico. La garza es majestuosa.',fr:'"Hunting Pollution" est impressionnant: tout un immeuble devenu manifeste écologique. Le héron est majestueux.',de:'"Hunting Pollution" ist beeindruckend: ein ganzes Gebäude als ökologisches Manifest. Der Reiher ist majestätisch.',pt:'"Hunting Pollution" é impressionante: um edifício inteiro transformado em manifesto ecológico.',nl:'"Hunting Pollution" is indrukwekkend: een heel gebouw als ecologisch manifest.',pl:'"Hunting Pollution" jest imponujące: cały budynek stał się ekologicznym manifestem.',ru:'"Hunting Pollution" — впечатляет: целое здание стало экологическим манифестом.',zh:'"Hunting Pollution"令人印象深刻：整栋楼变成了生态宣言。苍鹭气势宏伟。',ja:'"Hunting Pollution"は圧巻です：建物全体が生態学的マニフェストになっています。',ar:'"هانتنج بولوشن" مثير للإعجاب: مبنى بأكمله تحول إلى بيان بيئي. الطائر مهيب.'},
      date:'1 mese fa'},
     {author:'Sara G.',rating:5,
      text:{it:'Sono passata di lì mille volte ma ogni volta l\'opera mi stupisce. Sapere che la vernice pulisce l\'aria del quartiere trafficato lo rende ancora più speciale.',en:'I\'ve walked past it a thousand times but each time the work amazes me. Knowing that the paint cleans the air of the busy neighbourhood makes it even more special.',es:'He pasado por allí mil veces pero cada vez la obra me sorprende. Saber que la pintura limpia el aire del barrio hace que sea aún más especial.',fr:'Je suis passée devant des milliers de fois mais l\'œuvre m\'impressionne à chaque fois.',de:'Ich bin tausendmal daran vorbeigegangen, aber jedes Mal überrascht mich das Werk.',pt:'Passei por lá mil vezes mas cada vez a obra me surpreende.',nl:'Ik liep er duizend keer langs maar het werk verbaast me elke keer.',pl:'Przeszłam tamtędy tysiąc razy, ale za każdym razem dzieło mnie zadziwia.',ru:'Я проходила мимо тысячу раз, но каждый раз работа удивляет меня.',zh:'我经过那里无数次，但每次这件作品都令我惊叹。知道油漆能净化繁忙街区的空气让它更加特别。',ja:'何千回も通り過ぎましたが、毎回この作品に驚かされます。',ar:'مررت من هناك ألف مرة لكن العمل يدهشني في كل مرة.'},
      date:'2 settimane fa'},
   ]},

  {id:'10',name:'Michele Rech',pseudo:'Zerocalcare',category:'murales',
   bio:{
     it:'Fumettista e street artist romano (Arezzo, 1983; cresciuto a Rebibbia). Il suo alter ego narrativo è una tartaruga antropomorfa, il suo quartiere è protagonista assoluto dei fumetti. Nel dicembre 2014, in collaborazione con ATAC e Più Libri Più Liberi, ha dipinto un mammut di 40 mq all\'ingresso della metro B di Rebibbia. Il mammut — simbolo d\'orgoglio del quartiere, dove negli anni \'80 furono trovate zanne preistoriche — campeggia con la scritta: "Welcome to Rebibbia. Qui ci manca tutto, non ci serve niente." Nel 2023 il murale è stato restaurato green con pitture eco-sostenibili. Autore di "La profezia dell\'armadillo" (Netflix 2021: "Strappare lungo i bordi").',
     en:'Roman cartoonist and street artist (Arezzo, 1983; grew up in Rebibbia). In December 2014, in collaboration with ATAC, he painted a 40 sqm mammoth at the entrance of metro B at Rebibbia. The mammoth — a symbol of neighbourhood pride, where prehistoric tusks were found in the 1980s — features the inscription: "Welcome to Rebibbia. We lack everything, we need nothing." In 2023 the mural was restored with eco-sustainable paints. Creator of "The Prophecy of the Armadillo" (Netflix 2021: "Tear Along the Dotted Line").',
     es:'Dibujante y artista callejero romano (Arezzo, 1983; creció en Rebibbia). En diciembre de 2014 pintó un mamut de 40 m² en la entrada del metro B de Rebibbia. El mamut lleva la inscripción: "Welcome to Rebibbia. Aquí nos falta todo, no nos hace falta nada."',
     fr:'Bédéiste et street artiste romain (Arezzo, 1983; a grandi à Rebibbia). En décembre 2014 il a peint un mammouth de 40 m² à l\'entrée du métro B à Rebibbia avec l\'inscription: "Welcome to Rebibbia. Ici il nous manque tout, nous n\'avons besoin de rien."',
     de:'Römischer Comiczeichner und Street Artist (Arezzo, 1983; aufgewachsen in Rebibbia). Im Dezember 2014 malte er ein 40 qm großes Mammut am Eingang der Metro B in Rebibbia mit der Aufschrift: "Welcome to Rebibbia. Hier fehlt uns alles, wir brauchen nichts."',
     pt:'Autor de banda desenhada e artista de rua romano (Arezzo, 1983; cresceu em Rebibbia). Em dezembro de 2014 pintou um mamute de 40 m² na entrada do metro B em Rebibbia.',
     nl:'Romeinse striptekenaar en street artist (Arezzo, 1983; opgegroeid in Rebibbia). In december 2014 schilderde hij een mammoet van 40 m² bij de ingang van metro B in Rebibbia.',
     pl:'Rzymski rysownik i artysta uliczny (Arezzo, 1983; dorastał w Rebibbia). W grudniu 2014 namalował mamuta 40 m² przy wejściu do metra B w Rebibbia.',
     ru:'Римский комиксист и стрит-арт художник (Ареццо, 1983; вырос в Ребиббии). В декабре 2014 года нарисовал мамонта площадью 40 кв.м у входа в метро B на станции Rebibbia.',
     zh:'罗马漫画家和街头艺术家（阿雷佐，1983年；在Rebibbia长大）。2014年12月与ATAC合作，在Rebibbia地铁B线入口处绘制了一幅40平方米的猛犸象壁画，题词："Welcome to Rebibbia。这里什么都缺，我们什么都不需要。"',
     ja:'ローマ出身の漫画家・ストリートアーティスト（アレッツォ、1983年生まれ、レビッビア育ち）。2014年12月、ATACとの共同でレビッビア地下鉄B線入口に40㎡のマンモス壁画を制作。',
     ar:'رسام كاريكاتير وفنان شوارع روماني (أريتسو، 1983؛ نشأ في ريبيبيا). في ديسمبر 2014 رسم ماموت 40 م² عند مدخل مترو B في ريبيبيا مع النقش: "مرحباً بكم في ريبيبيا. هنا كل شيء ناقص، لا نحتاج لأي شيء."',
   },
   rating:4.9,reviews:256,lat:41.9450,lng:12.5302,city:'Roma',zone:'Rebibbia',
   performances:['Stazione Metro B Rebibbia','Via Ciciliano (zona Rebibbia)'],
   instagram:'https://www.instagram.com/zerocalcare/',website:'https://zerocalcare.it',igHandle:'@zerocalcare',
   reviews_data:[
     {author:'Cristina M.',rating:5,
      text:{it:'Il murale del mammut è un\'opera d\'amore per Rebibbia. Ogni volta che esco dalla metro mi commuove — è un inno alla periferia romana, sincero e fiero.',en:'The mammoth mural is a work of love for Rebibbia. Every time I come out of the metro it moves me — it\'s a sincere and proud anthem to the Roman suburbs.',es:'El mural del mamut es una obra de amor por Rebibbia. Cada vez que salgo del metro me emociona — es un himno sincero y orgulloso a las afueras romanas.',fr:'La fresque du mammouth est une œuvre d\'amour pour Rebibbia. Chaque fois que je sors du métro elle m\'émeut.',de:'Das Mammut-Wandbild ist ein Liebeswerk für Rebibbia. Jedes Mal, wenn ich aus der U-Bahn komme, bewegt es mich.',pt:'O mural do mamute é uma obra de amor por Rebibbia. Cada vez que saio do metro emociona-me.',nl:'Het mammoetschilderij is een liefdeswerk voor Rebibbia. Elke keer als ik uit de metro kom, ontroert het me.',pl:'Mural z mamutem to dzieło miłości do Rebibbia. Za każdym razem, gdy wychodzę z metra, wzrusza mnie.',ru:'Мурал с мамонтом — это произведение любви к Ребиббии. Каждый раз, выходя из метро, я растроган.',zh:'猛犸象壁画是对Rebibbia的爱的作品。每次出地铁都会感动我——是对罗马郊区真诚而自豪的颂歌。',ja:'マンモスの壁画はレビッビアへの愛の作品です。地下鉄から出るたびに感動します。',ar:'جدارية الماموث عمل حب لريبيبيا. في كل مرة أخرج من المترو يؤثر فيّ.'},
      date:'3 giorni fa'},
     {author:'Daniele S.',rating:5,
      text:{it:'Venivo qui da fuori Roma solo per vedere il mammut. L\'ironia e la malinconia di Zerocalcare per il suo quartiere sono incapsulate perfettamente in questo disegno.',en:'I came here from outside Rome just to see the mammoth. Zerocalcare\'s irony and melancholy for his neighbourhood are perfectly encapsulated in this drawing.',es:'Vine aquí desde fuera de Roma solo para ver el mamut. La ironía y la melancolía de Zerocalcare por su barrio están perfectamente encapsuladas en este dibujo.',fr:'Je suis venu de l\'extérieur de Rome juste pour voir le mammouth. L\'ironie et la mélancolie de Zerocalcare pour son quartier sont parfaitement encapsulées dans ce dessin.',de:'Ich kam extra aus außerhalb Roms, um das Mammut zu sehen.',pt:'Vim de fora de Roma só para ver o mamute.',nl:'Ik kwam van buiten Rome om het mammoet te zien.',pl:'Przyjechałem spoza Rzymu tylko po to, żeby zobaczyć mamuta.',ru:'Я специально приехал из-за пределов Рима, чтобы увидеть мамонта.',zh:'我从罗马郊外来只是为了看猛犸象。Zerocalcare对他街区的讽刺和忧郁在这幅画中被完美地封存。',ja:'ローマの外からわざわざマンモスを見に来ました。',ar:'جئت من خارج روما فقط لأرى الماموث.'},
      date:'2 settimane fa'},
   ]},

  {id:'11',name:'Blu',pseudo:'Blu',category:'murales',
   bio:{
     it:'Street artist anonimo italiano (Senigallia, ~1980), tra i più influenti al mondo secondo The Guardian. Formazione bolognese, stile fumettistico e caricaturale fortemente politico e sociale. A Roma opere monumentali all\'ex Caserma dell\'Aeronautica Militare (via del Porto Fluviale / via delle Conce, Ostiense): "I Mille Volti", due facciate ~2.000 mq con personaggi che denunciano ingiustizie sociali, sfruttamento, capitalismo (2013–2014). A Rebibbia: "Càpita" in via Ciciliano — uno scivolo acquatico intestinale che separa ricchi e poveri — e "La Spirale dell\'Evoluzione". Evita festival e gallerie. Ha distrutto i propri murales a Berlino e Bologna per protestare contro la gentrificazione dell\'arte di strada.',
     en:'Anonymous Italian street artist (Senigallia, ~1980), among the most influential in the world according to The Guardian. Bologna-based, with a strongly political and social cartoon-like style. In Rome, monumental works at the former Military Aeronautics Barracks (via del Porto Fluviale / via delle Conce, Ostiense): two facades ~2,000 sqm featuring characters denouncing social injustices (2013–2014). In Rebibbia: "Càpita" — an intestinal waterslide separating rich and poor. He destroyed his own murals in Berlin and Bologna to protest against the gentrification of street art.',
     es:'Artista callejero anónimo italiano (Senigallia, ~1980), entre los más influyentes del mundo según The Guardian. Estilo fumettístico muy político y social. En Roma, obras monumentales en la antigua Caserma dell\'Aeronautica (Ostiense) y en Rebibbia.',
     fr:'Street artiste anonyme italien (Senigallia, ~1980), parmi les plus influents au monde selon The Guardian. À Rome, œuvres monumentales sur l\'ex-Caserne de l\'Aéronautique (Ostiense) et à Rebibbia.',
     de:'Anonymer italienischer Street Artist (Senigallia, ~1980), laut The Guardian einer der einflussreichsten der Welt. In Rom monumentale Werke an der Ex-Kaserne der Aeronautik (Ostiense) und in Rebibbia.',
     pt:'Artista de rua anónimo italiano (Senigallia, ~1980), entre os mais influentes do mundo segundo The Guardian. Em Roma, obras monumentais na antiga Caserna da Aeronáutica (Ostiense) e em Rebibbia.',
     nl:'Anonieme Italiaanse street artist (Senigallia, ~1980), een van de meest invloedrijke ter wereld volgens The Guardian. In Rome monumentale werken bij de voormalige luchtvaartkazerne (Ostiense) en in Rebibbia.',
     pl:'Anonimowy włoski artysta uliczny (Senigallia, ~1980), jeden z najbardziej wpływowych na świecie według The Guardian. W Rzymie monumentalne prace przy byłych koszarach lotniczych (Ostiense) i w Rebibbia.',
     ru:'Анонимный итальянский стрит-арт художник (Сенигаллия, ~1980), один из самых влиятельных в мире по версии The Guardian. В Риме монументальные работы на бывших казармах ВВС (Остиенсе) и в Ребиббии.',
     zh:'匿名意大利街头艺术家（塞尼加利亚，约1980年），据《卫报》评选为全球最具影响力的艺术家之一。在罗马，于Ostiense的前军事航空兵营（Porto Fluviale路/Conce路）留有约2000平方米的巨型作品，在Rebibbia有"Càpita"等政治壁画。',
     ja:'匿名のイタリア人ストリートアーティスト（セニガッリア、1980年頃）。ガーディアン紙によれば世界で最も影響力のあるアーティストの一人。ローマではオスティエンセの旧空軍兵営（約2000㎡）とレビッビアに政治的な大型作品を残す。',
     ar:'فنان شوارع إيطالي مجهول الهوية (سينيغاليا، ~1980)، من أكثر الفنانين تأثيراً في العالم وفق صحيفة الغارديان. في روما أعمال ضخمة في ثكنة سلاح الجو السابقة (أوستيينسي) وفي ريبيبيا.',
   },
   rating:4.9,reviews:312,lat:41.8698,lng:12.4762,city:'Roma',zone:'Ostiense / Rebibbia',
   performances:['Via del Porto Fluviale, Ostiense (ex Caserma Aeronautica)','Via Ciciliano, Rebibbia','Via Palombini, Rebibbia','Ex Cinodromo, Ponte Marconi'],
   instagram:null,website:'https://blublu.org',igHandle:null,
   reviews_data:[
     {author:'Matteo R.',rating:5,
      text:{it:'I "Mille Volti" sulla caserma dell\'Ostiense erano un\'opera unica. Ogni personaggio una storia, ogni finestra un occhio che ti guarda. Arte politica al suo massimo.',en:'The "Thousand Faces" on the Ostiense barracks were a unique work. Every character a story, every window an eye watching you. Political art at its finest.',es:'Los "Mil Rostros" en la caserna de Ostiense eran una obra única. Cada personaje una historia, cada ventana un ojo que te mira.',fr:'Les "Mille Visages" sur la caserne d\'Ostiense étaient une œuvre unique. Chaque personnage une histoire, chaque fenêtre un œil qui vous regarde.',de:'Die "Tausend Gesichter" an der Ostiense-Kaserne waren ein einzigartiges Werk.',pt:'Os "Mil Rostos" na caserna de Ostiense eram uma obra única.',nl:'De "Duizend Gezichten" op de kazerne van Ostiense waren een uniek werk.',pl:'"Tysiąc Twarzy" na koszarach Ostiense było unikalnym dziełem.',ru:'"Тысяча лиц" на казарме Остиенсе было уникальным произведением.',zh:'Ostiense兵营上的"千张面孔"是一件独一无二的作品。每个人物都有一段故事，每扇窗户都是一双注视着你的眼睛。',ja:'オスティエンセの兵営の「千の顔」はユニークな作品でした。',ar:'"الوجوه الألف" على الثكنة كانت عملاً فريداً.'},
      date:'1 settimana fa'},
     {author:'Giulia N.',rating:5,

// ── GEOLOCATION STATE ──
let userMarker=null, userCircle=null, watchId=null, userPos=null, isTracking=false;

function initMap(){
  map=L.map('map',{zoomControl:true,attributionControl:true}).setView([41.8967,12.4822],13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CartoDB',maxZoom:19}).addTo(map);
  map.on('click',()=>{closePopup();});
  renderMarkers();
  startGeolocation();
}

function showToast(msg,duration=3000){
  const t=document.getElementById('geoToast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.classList.remove('show'),duration);
}

function startGeolocation(){
  // Always show "open in maps" button as helper
  renderOpenMapsBtn();

  if(!navigator.geolocation){
    showToast(t('geoNA'));
    useIPGeolocation();
    return;
  }
  showToast(t('geoSearching'),60000);

  // Step 1 – coarse fix (WiFi/cell, fast)
  navigator.geolocation.getCurrentPosition(
    pos=>{ if(!userPos||userPos.acc>pos.coords.accuracy) onPosition(pos); },
    ()=>{ if(!userPos) useIPGeolocation(); },
    {enableHighAccuracy:false,timeout:4000,maximumAge:60000}
  );

  // Step 2 – high-accuracy GPS watch
  watchId=navigator.geolocation.watchPosition(
    onPosition,
    err=>{
      if(!userPos) useIPGeolocation();
      onGeoError(err);
    },
    {enableHighAccuracy:true,timeout:25000,maximumAge:0}
  );
}

// IP-based fallback (city-level, ~1-10km accuracy — clearly labelled)
async function useIPGeolocation(){
  try{
    showToast('🌐 Posizione approssimativa via IP…',8000);
    const r=await fetch('https://ipapi.co/json/');
    const d=await r.json();
    if(d.latitude&&d.longitude){
      const fakePos={coords:{latitude:d.latitude,longitude:d.longitude,accuracy:5000}};
      onPosition(fakePos,true); // true = isIPFallback
    }
  }catch(e){
    showToast('⚠️ Posizione non disponibile',4000);
  }
}

function renderOpenMapsBtn(){
  if(document.getElementById('openMapsBtn')) return;
  const btn=document.createElement('button');
  btn.id='openMapsBtn';
  btn.title='Apri Google Maps per vedere la tua posizione esatta';
  btn.innerHTML='🗺️';
  btn.onclick=()=>{
    const url=userPos
      ?`https://www.google.com/maps?q=${userPos.lat},${userPos.lng}`
      :'https://www.google.com/maps';
    window.open(url,'_blank');
  };
  btn.style.cssText='position:absolute;bottom:144px;right:14px;z-index:1000;width:40px;height:40px;background:#fff;border:none;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s';
  document.querySelector('.main').appendChild(btn);
}

function onPosition(pos, isIPFallback=false){
  const lat=pos.coords.latitude;
  const lng=pos.coords.longitude;
  const acc=Math.round(pos.coords.accuracy);

  // Only update if new fix is better than current (or first fix)
  if(userPos && userPos.acc && acc >= userPos.acc && !isIPFallback) return;

  userPos={lat,lng,acc};

  const zoom = isIPFallback ? 12 : (acc<20?18 : acc<50?17 : acc<150?16 : acc<500?15 : 14);
  const accLabel = isIPFallback ? '~città' : `±${acc}m`;
  const popupLabel = isIPFallback
    ? `<b>📍 Posizione approssimativa</b><br><small>Basata sull'IP (~${Math.round(acc/1000)}km)</small>`
    : `<b>${t('youAreHere')}</b><br><small>${accLabel}</small>`;

  if(!userMarker){
    const dotHtml = isIPFallback
      ? `<div style="width:18px;height:18px;background:#F97316;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(249,115,22,.5);opacity:.7"></div>`
      : `<div class="user-dot-wrap"><div class="user-dot-pulse"></div><div class="user-dot"></div></div>`;
    const icon=L.divIcon({className:'',html:dotHtml,iconSize:[20,20],iconAnchor:[10,10]});
    userMarker=L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(map);
    userMarker.bindPopup(popupLabel,{closeButton:false,offset:[0,-8]});
    map.setView([lat,lng],zoom);
    const msg=isIPFallback?'🌐 Posizione approssimativa (IP). Per la posizione esatta usa GPS o Google Maps.':(`${t('geoFound')} ${accLabel}`);
    showToast(msg, isIPFallback?7000:3000);
    if(!isIPFallback){
      document.getElementById('locateBtn').classList.add('tracking');
      isTracking=true;
    }
    updateNearbyArtists();
  } else {
    userMarker.setLatLng([lat,lng]);
    userMarker.setPopupContent(popupLabel);
    if(!isIPFallback){
      // Replace orange IP dot with blue GPS dot
      const icon=L.divIcon({className:'',html:`<div class="user-dot-wrap"><div class="user-dot-pulse"></div><div class="user-dot"></div></div>`,iconSize:[20,20],iconAnchor:[10,10]});
      userMarker.setIcon(icon);
      if(isTracking) map.panTo([lat,lng],{animate:true,duration:0.5});
      if(acc<50 && map.getZoom()<17) map.setZoom(17);
    }
  }

  if(userCircle){
    userCircle.setLatLng([lat,lng]);
    userCircle.setRadius(acc);
  } else {
    userCircle=L.circle([lat,lng],{
      radius:acc,
      color: isIPFallback?'#F97316':'#1A73E8',
      fillColor: isIPFallback?'#F97316':'#1A73E8',
      fillOpacity:0.06,weight:1.5,opacity:0.35,
      dashArray: isIPFallback?'6 4':null
    }).addTo(map);
  }
  updateNearbyArtists();
}

function onGeoError(err){
  const msgs={1:t('geoErr1'),2:t('geoErr2'),3:t('geoErr3')};
  showToast('⚠️ '+(msgs[err.code]||t('geoErr2')),5000);
  document.getElementById('locateBtn').classList.remove('tracking');
}

function centerOnUser(){
  if(!userPos){
    showToast(t('geoSearching'));
    if(!watchId) startGeolocation();
    return;
  }
  isTracking=true;
  map.setView([userPos.lat,userPos.lng],16,{animate:true});
  document.getElementById('locateBtn').classList.add('tracking');
  document.getElementById('locateBtn').textContent='🔵';
  setTimeout(()=>document.getElementById('locateBtn').textContent='📍',2000);
  userMarker?.openPopup();
  showToast(t('geoCentered'));
  updateNearbyArtists();
}

// Stop auto-follow when user drags map
function initMapDragStop(){
  map.on('dragstart',()=>{
    isTracking=false;
    document.getElementById('locateBtn').classList.remove('tracking');
  });
}

function haversine(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function formatDist(m){return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km';}

function updateNearbyArtists(){
  if(!userPos) return;
  // Add distance to each artist and re-render list if visible
  ARTISTS.forEach(a=>{a._dist=haversine(userPos.lat,userPos.lng,a.lat,a.lng);});
  if(vMode==='lista') renderList();
}
function renderMarkers(){
  markers.forEach(m=>map.removeLayer(m));markers=[];
  getFA().forEach(a=>{
    const col=gc(a.category);
    const icon=L.divIcon({className:'',html:`<div class="custom-marker" style="background:${col}" title="${a.name} (${a.pseudo})"></div>`,iconSize:[20,20],iconAnchor:[10,10]});
    const m=L.marker([a.lat,a.lng],{icon}).addTo(map);
    m.on('click',(e)=>{e.originalEvent.stopPropagation();showPopup(a);});
    markers.push(m);
  });
}
function showPopup(a){
  const p=document.getElementById('artistPopup');
  document.getElementById('popupDot').style.background=gc(a.category);
  document.getElementById('popupName').textContent=a.name;
  const dist=a._dist?` · 🧭 ${formatDist(a._dist)}`:'';
  document.getElementById('popupZone').textContent=gi(a.category)+' '+a.pseudo+' · '+a.zone+dist;
  document.getElementById('popupRating').textContent=a.rating;
  document.getElementById('popupOpenBtn').onclick=()=>openArtistModal(a.id);
  p.classList.add('show');
}
function closePopup(){document.getElementById('artistPopup').classList.remove('show');}

function renderList(){
  const lv=document.getElementById('listView');
  if(aTab==='artisti'){
    const f=getFA();
    if(!f.length){lv.innerHTML=`<div class="empty-state"><div class="empty-icon">🎨</div><span>${t('emptyArtists')}</span></div>`;return;}
    lv.innerHTML=f.map(a=>`
      <div class="artist-card" onclick="openArtistModal('${a.id}')">
        <div class="card-avatar" style="background:${gc(a.category)}22">${gi(a.category)}</div>
        <div class="card-info">
          <div class="card-name">${a.name}${a._dist&&a._dist<2000?`<span class="nearby-badge">${t('nearby')}</span>`:''}</div>
          <div class="card-pseudo">${a.pseudo}</div>
          <div class="card-zone">📍 ${a.zone}</div>
          ${a._dist?`<div class="dist-text">🧭 ${formatDist(a._dist)} ${t('fromYou')}</div>`:''}
          <div class="card-rating"><span class="star">★</span> ${a.rating} <span style="color:#BFB8AE">(${a.reviews})</span></div>
        </div>
        <div class="card-dot" style="background:${gc(a.category)}"></div>
        <span class="card-chevron">›</span>
      </div>`).join('');
  }else{
    const f=getFE();
    if(!f.length){lv.innerHTML=`<div class="empty-state"><div class="empty-icon">📅</div><span>${t('emptyExhibitions')}</span></div>`;return;}
    lv.innerHTML=f.map(e=>{const d=new Date(e.date);return`
      <div class="exh-card">
        <div class="ex-date-box" style="background:${gc(e.category)}">
          <div class="ex-date-day">${d.getDate()}</div>
          <div class="ex-date-month">${d.toLocaleString('it-IT',{month:'short'}).toUpperCase()}</div>
        </div>
        <div class="ex-info">
          <div class="ex-title">${e.title}</div>
          <div class="ex-artist">${gi(e.category)} ${e.artist}</div>
          <div class="ex-location">📍 ${e.location}</div>
          <div class="ex-tags"><span class="tag tag-time">⏰ ${e.time}</span>${e.free?`<span class="tag tag-free">${t('free')}</span>`:''}</div>
        </div>
      </div>`;}).join('');
  }
}

function getFA(){const q=document.getElementById('searchInput').value.toLowerCase();return ARTISTS.filter(a=>{const mc=sCat==='tutti'||a.category===sCat;const mq=!q||a.name.toLowerCase().includes(q)||a.pseudo.toLowerCase().includes(q)||a.zone.toLowerCase().includes(q);return mc&&mq;});}
function getFE(){const q=document.getElementById('searchInput').value.toLowerCase();return EXHIBITIONS.filter(e=>{const mc=sCat==='tutti'||e.category===sCat;const mq=!q||e.title.toLowerCase().includes(q)||e.location.toLowerCase().includes(q);return mc&&mq;});}
function applyFilters(){if(vMode==='mappa')renderMarkers();else renderList();updateFooter();}
function updateFooter(){document.getElementById('footer').innerHTML=t('footer',getFA().length,getFE().length);}

function getBio(a){
  const b=a.bio;
  if(typeof b==='string') return b;
  return b[currentLang]||b['en']||b['it']||'';
}
function getRevText(r){
  const tx=r.text;
  if(typeof tx==='string') return tx;
  return tx[currentLang]||tx['en']||tx['it']||'';
}

function openArtistModal(id){
  const a=ARTISTS.find(x=>x.id===id);if(!a)return;
  const cat=CATS.find(c=>c.id===a.category);
  if(!REVS[id])REVS[id]=[...(a.reviews_data||[])];
  const soc=`<div class="social-links">
    ${a.instagram?`<a class="social-link social-ig" href="${a.instagram}" target="_blank">📸 ${a.igHandle||t('socialIG')}</a>`:''}
    ${a.website?`<a class="social-link social-web" href="${a.website}" target="_blank">🌐 ${t('socialWeb')}</a>`:''}
  </div>`;
  document.getElementById('artistModalBody').innerHTML=`
    <div class="artist-detail-avatar" style="background:${cat.color}22">${cat.icon}</div>
    <div class="artist-detail-name">${a.name}</div>
    <div class="artist-pseudo">${a.pseudo}</div>
    <div class="artist-detail-rating">
      ${[1,2,3,4,5].map(s=>`<span class="${s<=Math.round(a.rating)?'sf':'se'}">★</span>`).join('')}
      <span class="rating-text">${a.rating}</span>
      <span class="rating-count">(${a.reviews} ${t('reviews').toLowerCase()})</span>
    </div>
    <div class="cat-badge" style="background:${cat.color}">${cat.icon} ${gl(cat.id)}</div>
    <div class="detail-location">📍 ${a.zone}, ${a.city}</div>
    ${soc}
    <div class="divider"></div>
    <div class="section-title">${t('bio')}</div>
    <div class="bio-text">${getBio(a)}</div>
    <div class="divider"></div>
    <div class="section-title">${t('performanceZones')}</div>
    <div class="perf-pills">${a.performances.map(p=>`<div class="perf-pill">📍 ${p}</div>`).join('')}</div>
    <div class="divider"></div>
    <div class="section-title">${t('reviews')} (${REVS[id].length})</div>
    <div id="rvList">${REVS[id].map(rCard).join('')}</div>
    <div class="divider"></div>
    <div class="section-title">${t('leaveReview')}</div>
    <div class="star-picker" id="spicker">
      ${[1,2,3,4,5].map(s=>`<span class="star-pick" onclick="setRR(${s},'${id}')" id="sp${s}">★</span>`).join('')}
    </div>
    <textarea class="review-textarea" id="rvTxt" rows="3" placeholder="${t('reviewPlaceholder')}"></textarea>
    <button class="submit-btn" onclick="submitRev('${id}')">${t('sendReview')}</button>`;
  revRating=0;
  document.getElementById('artistModal').dataset.artistId=id;
  document.getElementById('artistModal').classList.add('show');
}
function rCard(r){return`<div class="review-card">
  <div class="review-header">
    <div class="review-avatar">${r.author[0]}</div>
    <div style="flex:1"><div class="review-author">${r.author}</div><div class="review-date">${r.date}</div></div>
    <div class="review-stars">${[1,2,3,4,5].map(s=>`<span style="color:${s<=r.rating?'#E8A000':'#EAE5DC'}">★</span>`).join('')}</div>
  </div>
  <div class="review-text">${getRevText(r)}</div>
</div>`;}
function setRR(v,id){revRating=v;for(let i=1;i<=5;i++){const s=document.getElementById(`sp${i}`);if(s)s.classList.toggle('active',i<=v);}}
function submitRev(aid){
  const txt=document.getElementById('rvTxt').value.trim();
  if(!txt||revRating===0){alert(t('alertReview'));return;}
  REVS[aid]=[{author:'Tu',rating:revRating,text:txt,date:'adesso'},...REVS[aid]];
  document.getElementById('rvList').innerHTML=REVS[aid].map(rCard).join('');
  document.getElementById('rvTxt').value='';revRating=0;
  [1,2,3,4,5].forEach(i=>{const s=document.getElementById(`sp${i}`);if(s)s.classList.remove('active');});
}
function closeArtistModal(){document.getElementById('artistModal').classList.remove('show');}

function openAddModal(){addType='artista';addCat='';document.getElementById('addTypeArtista').classList.add('active');document.getElementById('addTypeEsibizione').classList.remove('active');renderAddForm();document.getElementById('addModal').classList.add('show');}
function closeAddModal(){document.getElementById('addModal').classList.remove('show');}
function switchAddType(t){addType=t;addCat='';document.getElementById('addTypeArtista').classList.toggle('active',t==='artista');document.getElementById('addTypeEsibizione').classList.toggle('active',t==='esibizione');renderAddForm();}
function renderAddForm(){
  const cats=CATS.filter(c=>c.id!=='tutti');
  const cg=`<div class="form-field"><label class="form-label">${t('catLabel')}</label><div class="cat-grid">${cats.map(c=>`<div class="cat-option ${addCat===c.id?'selected':''}" style="${addCat===c.id?`border-color:${c.color};background:${c.color}18;color:${c.color}`:''}" onclick="selAC('${c.id}')">${c.icon} ${t(c.labelKey)}</div>`).join('')}</div></div>`;
  document.getElementById('addFormFields').innerHTML=addType==='artista'?`
    <div class="form-field"><label class="form-label">${t('nameLabel')}</label><input class="form-input" id="fn" placeholder="${t('namePlaceholder')}"></div>
    <div class="form-field"><label class="form-label">${t('pseudoLabel')}</label><input class="form-input" id="fp" placeholder="${t('pseudoPlaceholder')}"></div>
    <div class="form-field"><label class="form-label">${t('zoneLabel')}</label><input class="form-input" id="fz" placeholder="${t('zonePlaceholder')}"></div>
    <div class="form-field"><label class="form-label">${t('bioLabel')}</label><textarea class="form-input review-textarea" id="fb" rows="3" placeholder="${t('bioPlaceholder')}"></textarea></div>
    ${cg}`:`
    <div class="form-field"><label class="form-label">${t('titleLabel')}</label><input class="form-input" id="ft" placeholder="${t('titlePlaceholder')}"></div>
    <div class="form-field"><label class="form-label">${t('dateLabel')}</label><input class="form-input" id="fd" type="date"></div>
    <div class="form-field"><label class="form-label">${t('timeLabel')}</label><input class="form-input" id="fh" type="time" value="18:00"></div>
    <div class="form-field"><label class="form-label">${t('locationLabel')}</label><input class="form-input" id="fl" placeholder="${t('locationPlaceholder')}"></div>
    ${cg}`;
}
function selAC(id){addCat=id;renderAddForm();}
function submitAdd(){
  if(addType==='artista'){
    const n=document.getElementById('fn')?.value.trim(),z=document.getElementById('fz')?.value.trim();
    if(!n||!z||!addCat){alert(t('alertFillArtist'));return;}
    ARTISTS.push({id:Date.now().toString(),name:n,pseudo:document.getElementById('fp')?.value.trim()||n,category:addCat,bio:document.getElementById('fb')?.value.trim()||'',rating:5,reviews:0,lat:41.9+(Math.random()-.5)*.06,lng:12.48+(Math.random()-.5)*.06,city:'Roma',zone:z,performances:[z],instagram:null,website:null,igHandle:null,reviews_data:[]});
    alert(t('alertAddedArtist',n));
  }else{
    const t2=document.getElementById('ft')?.value.trim(),d=document.getElementById('fd')?.value,l=document.getElementById('fl')?.value.trim();
    if(!t2||!d||!l||!addCat){alert(t('alertFillExh'));return;}
    EXHIBITIONS.push({id:'e'+Date.now(),title:t2,artist:'Da definire',artistId:null,category:addCat,date:d,time:document.getElementById('fh')?.value||'00:00',location:l,lat:41.9,lng:12.48,free:true});
    alert(t('alertAddedExh',t2));
  }
  closeAddModal();applyFilters();
}
document.getElementById('artistModal').addEventListener('click',function(e){if(e.target===this)closeArtistModal();});
document.getElementById('addModal').addEventListener('click',function(e){if(e.target===this)closeAddModal();});
</script>

<div id="installBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:99998;background:linear-gradient(135deg,#1A1025,#2D1B4E);color:#fff;padding:14px 20px;box-shadow:0 -4px 20px rgba(0,0,0,.3);animation:slideUp .3s ease">
  <div style="display:flex;align-items:center;gap:12px;max-width:480px;margin:0 auto">
    <span style="font-size:28px">🎨</span>
    <div style="flex:1">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px">INSTALLA STREETART ROMA</div>
      <div style="font-size:12px;opacity:.8;margin-top:2px">Aggiungila alla schermata home — funziona offline</div>
    </div>
    <button onclick="installPWA()" style="background:#E8A000;color:#1A1025;border:none;border-radius:8px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0">Installa</button>
    <button onclick="document.getElementById('installBanner').style.display='none'" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;opacity:.7;padding:4px">✕</button>
  </div>
</div>

<style>
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>

<script>
// ── PWA INSTALL ──
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show banner after 3 seconds
  setTimeout(() => {
    const banner = document.getElementById('installBanner');
    if (banner) banner.style.display = 'flex';
  }, 3000);
});

function installPWA() {
  if (!deferredPrompt) {
    // Fallback: show manual instructions
    alert('Per installare:\n1. Apri questo link in Chrome Android\n2. Tocca ⋮ (menu in alto a destra)\n3. Seleziona "Aggiungi alla schermata Home"\n4. Conferma — apparirà come app!');
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(choice => {
    if (choice.outcome === 'accepted') {
      document.getElementById('installBanner').style.display = 'none';
    }
    deferredPrompt = null;
  });
}

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').style.display = 'none';
  deferredPrompt = null;
});

// ── SERVICE WORKER (cache offline) ──
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'streetart-roma-v1';
const ASSETS = [
  'https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap',
  'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css',
  'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js',
];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS).catch(()=>{})));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      if (cached) return cached;
      return fetch(e.request).then(res => {
        if (res && res.status === 200 && e.request.url.startsWith('https://')) {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return res;
      }).catch(() => cached);
    })
  );
});
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope: '/'})
    .catch(() => {}); // silently fail if blocked (file://)
}
</script>
