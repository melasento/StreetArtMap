<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Street Art Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
}

#map{
height:100vh;
width:100%;
}

.header{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:8px 14px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
z-index:1000;
font-weight:bold;
}

.locateBtn{
position:absolute;
bottom:20px;
right:20px;
z-index:1000;
background:black;
color:white;
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">Street Art Map</div>
<div id="map"></div>

<button class="locateBtn" onclick="locateUser()">Trova street art vicino</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>

const map = L.map('map').setView([41.9,12.5],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

const markers = L.markerClusterGroup();

fetch("artists.json")
.then(res=>res.json())
.then(data=>{

data.forEach(artist=>{

const marker = L.marker([artist.lat,artist.lng]);

let popup = `<b>${artist.name}</b><br>${artist.city || ""}`;

if(artist.image){
popup += `<br><img src="${artist.image}" width="200">`;
}

if(artist.instagram){
popup += `<br><a href="${artist.instagram}" target="_blank">Instagram</a>`;
}

marker.bindPopup(popup);
markers.addLayer(marker);

});

map.addLayer(markers);

});

function locateUser(){

if(!navigator.geolocation){
alert("GPS non supportato");
return;
}

navigator.geolocation.getCurrentPosition(pos=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

map.setView([lat,lng],15);

L.marker([lat,lng])
.addTo(map)
.bindPopup("Sei qui")
.openPopup();

});

}

</script>

</body>
</html>
